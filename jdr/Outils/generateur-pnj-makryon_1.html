        }

        }

            color: #fff;
            border: 2px solid #d4af37;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(139, 105, 20, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, #a08020 0%, #8b6914 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

            background: rgba(60, 40, 25, 0.8);

            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pnj-card.show {
            display: block;
        }

        .pnj-name {
            font-size: 1.8em;
            color: #d4af37;
            margin-bottom: 5px;
            font-weight: bold;
            border-bottom: 2px solid #8b6914;

            font-size: 0.9em;
            color: #a08040;
            margin-bottom: 15px;
            font-style: italic;
        }

            padding: 10px;
            background: rgba(40, 25, 15, 0.5);
            border-left: 3px solid #8b6914;
            border-radius: 5px;
        }

            font-weight: bold;
            color: #d4af37;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .pnj-content {
            color: #e8d5c4;
            line-height: 1.6;
            margin-top: 5px;
        }

        .mots-cles {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

            background: #6b4f0f;
            color: #d4af37;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            border: 1px solid #8b6914;

            padding: 3px 10px;
            border-radius: 5px;

            margin-left: 10px;

            border-top: 2px solid #8b6914;
        }

        .history-title {
            color: #d4af37;
            font-size: 1.2em;
            margin-bottom: 15px;
            font-weight: bold;
        }

            background: rgba(40, 25, 15, 0.6);

            font-size: 0.9em;
            margin-top: 10px;

            {job: "Constructeur de navires", detail: "bâtit et répare bateaux"},

            {job: "Armurier", detail: "forge armes de qualité"},
            {job: "Vitrier", detail: "pose et répare les vitres"},
            {job: "Charpentier", detail: "construit charpentes et meubles"},
            {job: "Maçon", detail: "bâtit murs et fondations"},
            {job: "Couvreur", detail: "répare les toits qui fuient"},
            {job: "Peintre en bâtiment", detail: "décore façades et intérieurs"},
            {job: "Mosaïste", detail: "crée fresques et pavements"},
            {job: "Orfèvre", detail: "travaille l'or et l'argent fin"},
            {job: "Joaillier", detail: "taille et sertit pierres précieuses"},
            {job: "Parfumeur", detail: "compose essences rares"},
            {job: "Confiseur", detail: "prépare sucreries et douceurs"},
            {job: "Brasseur", detail: "fabrique bières et alcools"},
            {job: "Fromager", detail: "affine fromages de toute sorte"},
            {job: "Épicier", detail: "vend épices venues de loin"},
            {job: "Libraire", detail: "copie et vend manuscrits"},

            {job: "Herboriste", detail: "connaît plantes et simples"},
            {job: "Vétérinaire", detail: "soigne animaux malades"}
        ];

        const accroches = [
            "Cherche désespérément quelqu'un pour une tâche urgente et louche",
            "Possède une information précieuse sur un événement récent",
            "A perdu un objet de valeur et offre une récompense",
            "Est témoin d'un crime mais a peur de parler",
            "Propose un travail bien payé mais ne dit pas tout",
            "A une dette envers quelqu'un de dangereux",
            "Cherche à se venger d'une injustice subie",
            "Peut fournir un accès à un lieu normalement interdit",
            "Connaît un secret sur l'une des Maisons",
            "A besoin d'aide pour fuir quelqu'un ou quelque chose",
            "Vend des objets d'origine douteuse",
            "Peut enseigner une compétence rare",
            "Cherche un membre de sa famille disparu",
            "A découvert quelque chose d'étrange dans le quartier",
            "Propose un marché : un service contre un autre",
            "Est poursuivi par des créanciers impitoyables",
            "Cache quelqu'un ou quelque chose d'illégal",
            "Veut engager des gardes du corps pour la nuit",
            "Prétend avoir vu un fantôme ou une apparition",
            "Cherche quelqu'un pour livrer un message secret",
            "A trouvé un objet magique mais ne sait pas comment l'utiliser",
            "Veut faire chanter quelqu'un d'influent",
            "Cherche des complices pour un cambriolage",
            "A été témoin d'une rencontre suspecte entre notables",
            "Vend de fausses informations aux naïfs",
            "Est un espion déguisé cherchant à recruter",
            "Veut engager quelqu'un pour un faux témoignage",
            "Cherche à saboter le commerce d'un rival",
            "Prétend pouvoir prédire l'avenir contre paiement",
            "A découvert un passage secret dans les égouts",
            "Vend des reliques religieuses contrefaites",
            "Cherche à organiser une évasion de prison",
            "Veut faire passer un message à quelqu'un à La Vieille",
            "Propose de falsifier des documents officiels",
            "Cherche des cobayes pour tester une potion",
            "A vu quelque chose d'interdit dans le Quartier Interdit",
            "Vend des places pour un spectacle clandestin",
            "Cherche à retrouver un amour perdu",
            "Propose d'organiser un combat truqué à l'Arène",
            "A une carte menant à un trésor caché",
            "Veut engager quelqu'un pour empoisonner un rival",
            "Cherche protection contre la Maison Lokyon",
            "Prétend pouvoir communiquer avec les morts",
            "Vend de l'eau de la Place des Larmes aux vertus miraculeuses",
            "Cherche à infiltrer l'Académie pour voler un grimoire",
            "Propose de parier sur des courses illégales",
            "A découvert un réseau de tunnels sous la ville",
            "Veut engager quelqu'un pour séduire quelqu'un d'autre",
            "Cherche un faux alibi pour un crime qu'il n'a pas commis",
            "Propose de révéler l'identité d'un changeforme caché"
        ];

        let history = JSON.parse(localStorage.getItem('pnjHistory')) || [];

        function random(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function genererPNJ() {
            const genre = Math.random() > 0.5 ? 'masculin' : 'féminin';
            const prenom = genererNomProcedural();
            const surnom = Math.random() > 0.5 ? ` "${random(surnoms)}"` : '';
            const nom = prenom + surnom;
            
            // Génération détaillée de l'apparence
            const ageInfo = random(ages);
            const ageExact = ageInfo.age();
            const corpulence = random(corpulences);
            const visage = random(visages);
            const cheveu = random(cheveux);
            const oeil = random(yeux);
            const particulier = random(particuliers);
            const vetement = random(vetements);
            
            const apparenceComplete = `${ageInfo.tranche} (${ageExact} ans), ${corpulence}. ${visage}, ${cheveu}, ${oeil}. ${particulier}. Porte ${vetement}.`;
            
            const caractere = random(caracteres);
            const profession = random(professions);
            const quartier = random(quartiers);
            const accroche = random(accroches);
            
            // Générer 3 mots-clés
            const motsClesPossibles = [
                "Discret", "Méfiant", "Bavard", "Généreux", "Avare", "Loyal", "Traître",
                "Curieux", "Prudent", "Impulsif", "Patient", "Nerveux", "Calme",
                "Rusé", "Naïf", "Cynique", "Idéaliste", "Pragmatique", "Rêveur",
                "Violent", "Pacifique", "Ambitieux", "Résigné", "Opportuniste",
                "Superstitieux", "Rationnel", "Mystérieux", "Transparent", "Humble", "Arrogant",
                "Alcoolique", "Religieux", "Athée", "Cultivé", "Illettré", "Malade",
                "Vigoureux", "Colérique", "Doux", "Sadique", "Empathique", "Menteur",
                "Honnête", "Lâche", "Courageux", "Paranoïaque", "Naïf", "Calculateur",
                "Prodigue", "Économe", "Séducteur", "Timide", "Exhibitionniste", "Pudique",
                "Fataliste", "Volontaire", "Paresseux", "Travailleur", "Obsessionnel", "Désordonné"
            ];
            
            const motsCles = [];
            while(motsCles.length < 3) {
                const mot = random(motsClesPossibles);
                if(!motsCles.includes(mot)) motsCles.push(mot);
            }

            const pnj = {
                nom,
                genre: genre === 'masculin' ? 'Homme' : 'Femme',
                apparence: apparenceComplete,
                caractere,
                profession: `${profession.job} — ${profession.detail}`,
                quartier,
                motsCles,
                accroche,
                timestamp: new Date().toLocaleString('fr-FR')
            };

            afficherPNJ(pnj);
            ajouterHistorique(pnj);
        }

        function afficherPNJ(pnj) {
            document.getElementById('pnjName').textContent = pnj.nom;
            document.getElementById('pnjGender').innerHTML = `${pnj.genre} <span class="quartier-tag">${pnj.quartier}</span>`;
            document.getElementById('pnjApparence').textContent = pnj.apparence;
            document.getElementById('pnjCaractere').textContent = pnj.caractere;
            document.getElementById('pnjProfession').textContent = pnj.profession;
            document.getElementById('pnjAccroche').textContent = pnj.accroche;
            
            const motsClesContainer = document.getElementById('pnjMotsCles');
            motsClesContainer.innerHTML = '';
            pnj.motsCles.forEach(mot => {
                const span = document.createElement('span');
                span.className = 'mot-cle';
                span.textContent = mot;
                motsClesContainer.appendChild(span);
            });

            const card = document.getElementById('pnjCard');
            card.classList.remove('show');
            setTimeout(() => card.classList.add('show'), 10);
        }

        function ajouterHistorique(pnj) {
            history.unshift(pnj);
            if(history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('pnjHistory', JSON.stringify(history));
            afficherHistorique();
        }

        function afficherHistorique() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            if(history.length === 0) {
                historyList.innerHTML = '<div class="history-item" style="opacity: 0.5; cursor: default;">Aucun PNJ généré pour le moment</div>';
                return;
            }

            history.forEach((pnj, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<strong>${pnj.nom}</strong> — ${pnj.profession.split(' — ')[0]} <span style="opacity: 0.6; font-size: 0.85em;">(${pnj.timestamp})</span>`;
                item.onclick = () => afficherPNJ(pnj);
                historyList.appendChild(item);
            });
        }

        function clearHistory() {
            if(confirm('Voulez-vous vraiment effacer tout l\'historique ?')) {
                history = [];
                localStorage.removeItem('pnjHistory');
                afficherHistorique();
            }
        }

        // Charger l'historique au démarrage
        afficherHistorique();

        // Générer un premier PNJ automatiquement
        window.addEventListener('load', () => {
            setTimeout(genererPNJ, 500);
        });
    </script>
