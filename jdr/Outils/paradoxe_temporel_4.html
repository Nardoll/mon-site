<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Roue du Paradoxe</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C97A; --gold-dim: #7A6030;
  --red-mid: #B83232; --green-mid: #2E7046; --amber-mid: #9B6820; --gray-mid: #666;
  --amber-deep: #5C3A0A;
  --bg: #0E0B07; --panel: #1E1710; --panel2: #251E12;
  --border: rgba(201,168,76,0.18); --border2: rgba(201,168,76,0.32);
  --text: #F0E8D4; --text-dim: #9A8A6A; --text-faint: #5A4E38;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.06) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(139,26,26,.04) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* ── LAYOUT ── */
.shell{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:2.5rem 2rem 5rem;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:2.2rem;padding-bottom:1.8rem;border-bottom:1px solid var(--border);position:relative;}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:100px;height:1px;background:var(--gold);opacity:.6;}
.eyebrow{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.22em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.7rem;}
h1{font-family:'Cinzel',serif;font-size:clamp(1.7rem,3vw,2.5rem);font-weight:700;color:var(--gold-light);letter-spacing:.04em;line-height:1.2;margin-bottom:.6rem;}
.header-sub{font-style:italic;font-size:1.05rem;color:var(--text-dim);font-weight:300;}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:2.2rem;border-bottom:1px solid var(--border);}
.tab-btn{font-family:'Cinzel',serif;font-size:.82rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);background:none;border:none;border-bottom:2px solid transparent;padding:.75rem 1.8rem;cursor:pointer;transition:all .2s;margin-bottom:-1px;}
.tab-btn:hover{color:var(--text-dim);}
.tab-btn.active{color:var(--gold-light);border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── WHEEL TAB ── */
.wheel-layout{display:grid;grid-template-columns:1fr 420px;grid-template-rows:1fr auto;gap:0 3rem;align-items:start;}
.wheel-col{display:flex;flex-direction:column;align-items:center;gap:1.6rem;}
.wheel-wrap{position:relative;flex-shrink:0;}

/* Pointer on the RIGHT side */
.pointer-right{position:absolute;right:-8px;top:50%;transform:translateY(-50%);z-index:20;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}

canvas#wheel{display:block;border-radius:50%;box-shadow:0 0 0 2px rgba(201,168,76,.25),0 0 0 6px rgba(0,0,0,.5),0 0 40px rgba(201,168,76,.07),0 20px 60px rgba(0,0,0,.5);}
.spin-btn{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--bg);background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 50%,var(--gold-dim) 100%);border:none;border-radius:3px;padding:13px 44px;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(201,168,76,.2),0 2px 4px rgba(0,0,0,.4);}
.spin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(201,168,76,.3),0 2px 4px rgba(0,0,0,.4);}
.spin-btn:active{transform:scale(.98);}
.spin-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* Result panel */
.result-col{display:flex;flex-direction:column;gap:1.2rem;padding-top:.25rem;}
.result-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;gap:1rem;opacity:.35;}
.result-empty-icon{font-size:2.8rem;filter:grayscale(1);}
.result-empty p{font-style:italic;color:var(--text-dim);font-size:1rem;text-align:center;line-height:1.6;}
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;animation:fadeSlide .4s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.result-band{padding:1.1rem 1.3rem;display:flex;align-items:flex-start;gap:.9rem;border-bottom:1px solid var(--border);}
.sign-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.dot-plus{background:var(--green-mid);} .dot-minus{background:var(--red-mid);} .dot-tilde{background:var(--amber-mid);} .dot-gray{background:var(--gray-mid);}
.result-zone-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:4px;}
.result-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--gold-light);line-height:1.4;}
.result-body{padding:1.1rem 1.3rem;display:flex;flex-direction:column;gap:1rem;}
.result-info{font-size:1.05rem;line-height:1.75;color:var(--text);font-weight:300;}

/* Choices */
.choices-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;}
.choices-wrap{display:flex;flex-direction:column;gap:8px;}
.choice-btn{text-align:left;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-family:'Crimson Pro',serif;font-size:1rem;color:var(--text);cursor:pointer;transition:all .15s;line-height:1.4;}
.choice-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.06);color:var(--gold-light);}
.choice-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold-light);}
.choice-btn.selected::before{content:'✓  ';color:var(--gold);font-weight:600;}
/* Hidden parenthetical — revealed after click */
.choice-hint{font-size:.9rem;font-style:italic;color:var(--gold-dim);margin-top:4px;display:none;}
.choice-btn.selected .choice-hint{display:block;}

/* MJ secret */
.mj-toggle{display:flex;align-items:center;justify-content:space-between;background:rgba(92,58,10,.2);border:1px dashed rgba(201,168,76,.25);border-radius:4px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.mj-toggle:hover{background:rgba(92,58,10,.32);}
.mj-toggle-left{display:flex;align-items:center;gap:8px;}
.mj-eye{width:17px;height:17px;flex-shrink:0;opacity:.6;}
.mj-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-dim);}
.mj-caret{color:var(--gold-dim);font-size:10px;transition:transform .2s;}
.mj-caret.open{transform:rotate(180deg);}
.mj-reveal{display:none;margin-top:8px;background:rgba(92,58,10,.15);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:12px 14px;font-size:1rem;color:#D4A855;line-height:1.65;font-style:italic;}
.mj-reveal.visible{display:block;}

/* Legend */
.wheel-legend{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:2rem;padding-top:1.8rem;border-top:1px solid var(--border);margin-top:.5rem;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.88rem;color:var(--text-dim);}
.ldot{width:9px;height:9px;border-radius:50%;}

/* ── LIST TAB ── */
.list-grid{display:flex;flex-direction:column;gap:.5rem;}

/* Zone header */
.zone-header{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-dim);padding:.9rem 0 .4rem 1rem;margin-top:.8rem;}
.zone-header:first-child{margin-top:0;}

/* List row */
.list-row{background:var(--panel);border:1px solid var(--border);border-radius:5px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.list-row:hover{border-color:var(--border2);}
.list-row.open{border-color:var(--border2);}
.list-row-head{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;}
.list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.list-title{font-family:'Cinzel',serif;font-size:.92rem;font-weight:600;color:var(--gold-light);flex:1;line-height:1.35;}
.list-caret{color:var(--text-faint);font-size:11px;flex-shrink:0;transition:transform .2s;}
.list-row.open .list-caret{transform:rotate(180deg);}
.list-body{display:none;padding:.9rem 1.1rem 1rem 2.8rem;border-top:1px solid var(--border);flex-direction:column;gap:.9rem;}
.list-row.open .list-body{display:flex;}
.list-info{font-size:1rem;line-height:1.7;color:var(--text);font-weight:300;}

@media(max-width:860px){
  .wheel-layout{grid-template-columns:1fr;}
  .wheel-col{width:100%;}
  .wheel-legend{gap:1.2rem;}
}
</style>
</head>
<body>
<div class="shell">

  <header>
    <p class="eyebrow">Chroniques d'Aria</p>
    <h1>La Roue du Paradoxe</h1>
    <p class="header-sub">Le tissu du temps s'est déchiré — tournez la roue pour connaître votre destin</p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('wheel',this)">La Roue</button>
    <button class="tab-btn" onclick="switchTab('list',this)">Liste des Événements</button>
  </div>

  <!-- ══ TAB : ROUE ══════════════════════════════════════════════ -->
  <div class="tab-panel active" id="tab-wheel">
    <div class="wheel-layout">

      <div class="wheel-col">
        <div class="wheel-wrap" id="wheel-wrap">
          <!-- Pointer on the RIGHT -->
          <svg class="pointer-right" viewBox="0 0 28 24" width="28" height="24" xmlns="http://www.w3.org/2000/svg">
            <polygon points="26,12 2,22 8,12 2,2" fill="#C9A84C"/>
            <polygon points="26,12 2,22 8,12" fill="#E8C97A"/>
          </svg>
          <canvas id="wheel"></canvas>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="spinWheel()">Invoquer le Paradoxe</button>
      </div>

      <div class="result-col" id="result-col">
        <div class="result-empty">
          <div class="result-empty-icon">⧗</div>
          <p>Tournez la roue pour<br>révéler l'altération temporelle</p>
        </div>
      </div>

      <div class="wheel-legend">
        <div class="legend-item"><div class="ldot" style="background:var(--green-mid)"></div>Favorable</div>
        <div class="legend-item"><div class="ldot" style="background:var(--red-mid)"></div>Défavorable</div>
        <div class="legend-item"><div class="ldot" style="background:var(--amber-mid)"></div>Neutre / mystérieux</div>
        <div class="legend-item"><div class="ldot" style="background:var(--gray-mid)"></div>Mystère de Dave</div>
      </div>

    </div>
  </div>

  <!-- ══ TAB : LISTE ═════════════════════════════════════════════ -->
  <div class="tab-panel" id="tab-list">
    <div class="list-grid" id="list-grid"></div>
  </div>

</div><!-- .shell -->

<script>
/* ════════════════════════════════
   DATA
════════════════════════════════ */
const SEGMENTS = [
  { zone:"Avant la campagne",
    title:"Vernabule, admiratrice secrète", sign:"+", color:"#1D5C35",
    info:"Vernabule a bien cessé de travailler avec Gustave pour des différends moraux, mais ne l'a jamais bloqué à la guilde des marchands. Elle sera heureuse de le revoir s'ils se croisent." },
  { zone:"Avant la campagne",
    title:"Vernabule, ennemie du talent", sign:"-", color:"#7A1A1A",
    info:"Rien ne change dans les événements passés, mais Vernabule sera très hostile si elle croise Gustave ou apprend qu'il travaille sur un projet ambitieux." },
  { zone:"Quai des Sables",
    title:"Le collier de la noble Ererfel", sign:"+", color:"#1D5C35",
    info:"À Quai-des-Sables, vous avez réussi à retrouver le collier perdu de la noble Ererfel. Que s'est-il passé ensuite ?",
    choices:[
      { label:"Vous l'avez gardé", hint:"collier, p. 124" },
      { label:"Vous l'avez rendu", hint:"Ererfel vous en doit une" }
    ]},
  { zone:"Quai des Sables",
    title:"La lettre de Thaïs et Jacob", sign:"-", color:"#7A1A1A",
    info:"Vous avez compromis la lettre entre Thaïs et Jacob. Ils se sont disputés et Thaïs vous tient responsables de son chagrin d'amour. Elle cherchera peut-être à se venger, un jour." },
  { zone:"En mer",
    title:"Jabba la grenouille, survivant", sign:"+", color:"#1D5C35",
    info:"Jabba la grenouille a survécu. Vous l'avez transporté jusqu'à l'Île du Roi-Sorcier-Dragon où il a repris sa vie. Vous le recroiserez peut-être." },
  { zone:"Île du Roi-Sorcier-Dragon",
    title:"Sardine et le joyau de la couronne", sign:"~", color:"#7A5010",
    info:"Sardine a survécu et est reparti avec le gros joyau de la couronne. Vous le reverrez sûrement un jour." },
  { zone:"Île du Roi-Sorcier-Dragon",
    title:"Le tatouage maudit de Ciri", sign:"-", color:"#7A1A1A",
    info:"Le tatouage de Ciri a été complètement raté. Elle vous tient en partie responsables de la honte qu'elle doit porter." },
  { zone:"Routes de Mirabilia",
    title:"Le citron mystérieux de Dave", sign:"?", color:"#3E3E3E",
    info:"Dave, agriculteur d'Alusia, avait un autre citron « spécial » qu'il vous a donné.",
    mjSecret:"VERSION BÉNÉFIQUE — Le citron produit un effet positif au choix du MJ : soin, buff temporaire, surprise agréable, ou pouvoir intéressant." },
  { zone:"Routes de Mirabilia",
    title:"Le citron mystérieux de Dave", sign:"?", color:"#3E3E3E",
    info:"Dave, agriculteur d'Alusia, avait un autre citron « spécial » qu'il vous a donné.",
    mjSecret:"VERSION NÉFASTE — Le citron produit un effet négatif au choix du MJ : malus, effet bizarre et gênant, ou surprise très désagréable." },
  { zone:"Routes de Mirabilia",
    title:"Jasmine, enquêtrice de Sostile", sign:"+", color:"#1D5C35",
    info:"Tout le monde se souvient que Jasmine a mené l'enquête à la perfection. Elle a résolu l'affaire, les villageois l'ont remerciée et il n'y a pas eu de scène de bûcher." },
  { zone:"Routes de Mirabilia",
    title:"La rumeur de Sostile", sign:"-", color:"#7A1A1A",
    info:"Un habitant de Sostile a reconnu Jasmine et dit à qui veut l'entendre que l'enquêtrice a accusé un innocent. La rumeur se propage sur les routes." },
  { zone:"Nol",
    title:"Doclolo et le miracle de la cloche", sign:"+", color:"#1D5C35",
    info:"Le procès n'a pas eu lieu. L'accident n'a fait que blesser Doclolo, par miracle. Il a jugé que c'était un accident et tout est revenu à la normale." },
  { zone:"Nol",
    title:"Ernesto, seigneur de Nol", sign:"-", color:"#7A1A1A",
    info:"Grosse Caisse a été désigné nouveau seigneur de Nol par Eligios, le frère régent du Roi. Il dispose désormais des pleins pouvoirs sur la ville. De nombreux changements s'annoncent." },
  { zone:"Nol",
    title:"Le tribunal de Nol", sign:"-", color:"#7A1A1A",
    info:"Tout le monde a été déclaré coupable. Vous avez quitté Nol en criminels recherchés." },
  { zone:"Partout dans Aria",
    title:"La queue de cochon universelle", sign:"~", color:"#7A5010",
    info:"Particularité physique que tout le monde possède depuis toujours, sans savoir pourquoi. Peut-être un élément majeur de la campagne à venir ???? Devinez qui a fait cette proposition…" }
];

const WHEEL_LABELS = [
  ["Vernabule","admiratrice"],["Vernabule","ennemie"],
  ["Collier","d'Ererfel"],["Lettre","Thaïs & Jacob"],
  ["Jabba","la grenouille"],["Sardine &","le joyau"],
  ["Tatouage","de Ciri"],["Citron","de Dave"],["Citron","de Dave"],
  ["Jasmine","à Sostile"],["Rumeur","de Sostile"],
  ["Doclolo &","la cloche"],["Ernesto","de Nol"],["Tribunal","de Nol"],["Queue","de cochon"]
];

/* ════════════════════════════════
   TABS
════════════════════════════════ */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

/* ════════════════════════════════
   CANVAS / WHEEL
════════════════════════════════ */
const DISPLAY = 420;
const DPR = Math.min(window.devicePixelRatio||1,3);
const canvas = document.getElementById('wheel');
canvas.width  = DISPLAY*DPR; canvas.height = DISPLAY*DPR;
canvas.style.width = DISPLAY+'px'; canvas.style.height = DISPLAY+'px';
const ctx = canvas.getContext('2d');
ctx.scale(DPR,DPR);
const N=SEGMENTS.length, SZ=DISPLAY, R=SZ/2-5, CX=SZ/2, CY=SZ/2;
let angle=0, spinning=false;

function lighten(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;
}

function drawWheel(rot){
  ctx.clearRect(0,0,SZ,SZ);
  const arc=(2*Math.PI)/N;
  for(let i=0;i<N;i++){
    const s=rot+i*arc, e=s+arc, seg=SEGMENTS[i];
    const g=ctx.createRadialGradient(CX,CY,R*.3,CX,CY,R);
    g.addColorStop(0,lighten(seg.color,28)); g.addColorStop(1,seg.color);
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(CX,CY); ctx.rotate(s+arc/2);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    const lbs=WHEEL_LABELS[i]||[seg.title.slice(0,14)];
    const lh=13,tot=lbs.length*lh;
    lbs.forEach((line,li)=>{
      const y=-tot/2+li*lh+lh/2;
      ctx.font='500 11px Crimson Pro,Georgia,serif';
      ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillText(line,R-22,y+1);
      ctx.fillStyle='rgba(255,255,255,.95)'; ctx.fillText(line,R-22,y);
    });
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle='rgba(201,168,76,.5)'; ctx.lineWidth=2.5; ctx.stroke();
  const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,26);
  cg.addColorStop(0,'#E8C97A'); cg.addColorStop(1,'#5C3A0A');
  ctx.beginPath(); ctx.arc(CX,CY,22,0,2*Math.PI);
  ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1; ctx.stroke();
  ctx.font='600 12px Cinzel,serif'; ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✦',CX,CY);
}
drawWheel(angle);

function spinWheel(){
  if(spinning)return;
  spinning=true;
  document.getElementById('spin-btn').disabled=true;
  const total=(6+Math.floor(Math.random()*5))*2*Math.PI+Math.random()*2*Math.PI;
  const dur=3500+Math.random()*1200, t0=performance.now(), a0=angle;
  const ease=t=>1-Math.pow(1-Math.min(t,1),3);
  requestAnimationFrame(function frame(now){
    const t=Math.min((now-t0)/dur,1);
    angle=a0+total*ease(t); drawWheel(angle);
    if(t<1) requestAnimationFrame(frame);
    else{
      spinning=false;
      document.getElementById('spin-btn').disabled=false;
      document.getElementById('spin-btn').textContent='Tourner à nouveau';
      showResult(angle);
    }
  });
}

/* ════════════════════════════════
   RESULT (wheel tab)
   Pointer is on the RIGHT → pointing at angle 0 (canvas "east" = 3 o'clock).
   Segment i spans [rot + i*arc, rot + (i+1)*arc].
   We need the segment whose mid-angle is closest to 0 (mod 2π).
════════════════════════════════ */
function showResult(a){
  const arc=(2*Math.PI)/N;
  // Pointer at angle 0 (right). Find which segment contains 0.
  const norm=(((-a)%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/arc)%N;
  renderCard(SEGMENTS[idx], document.getElementById('result-col'));
}

/* ════════════════════════════════
   SHARED CARD RENDERER
════════════════════════════════ */
function dotClass(sign){ return sign==='+'?'dot-plus':sign==='-'?'dot-minus':sign==='?'?'dot-gray':'dot-tilde'; }

function renderCard(seg, container){
  container.innerHTML='';
  const card=document.createElement('div');
  card.className='result-card';
  card.innerHTML=`
    <div class="result-band">
      <div class="sign-dot ${dotClass(seg.sign)}"></div>
      <div>
        <div class="result-zone-label">${seg.zone}</div>
        <div class="result-title">${seg.title}</div>
      </div>
    </div>
    <div class="result-body">
      <p class="result-info">${seg.info}</p>
      ${seg.choices ? buildChoices(seg.choices) : ''}
      ${seg.mjSecret ? buildMJ(seg.mjSecret) : ''}
    </div>`;
  container.appendChild(card);
  wireCard(card, seg);
}

function wireCard(card, seg){
  if(seg.choices){
    card.querySelectorAll('.choice-btn').forEach(b=>b.addEventListener('click',()=>{
      card.querySelectorAll('.choice-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    }));
  }
  if(seg.mjSecret){
    const tog=card.querySelector('.mj-toggle'),rev=card.querySelector('.mj-reveal'),car=card.querySelector('.mj-caret');
    tog.addEventListener('click',()=>{ rev.classList.toggle('visible'); car.classList.toggle('open'); });
  }
}

/* Choices: label visible always, hint in parentheses only after click */
function buildChoices(choices){
  const btns=choices.map(c=>`
    <button class="choice-btn">
      <span class="choice-label">${c.label}</span>
      <span class="choice-hint">(${c.hint})</span>
    </button>`).join('');
  return `<div><p class="choices-label">Que s'est-il passé ?</p><div class="choices-wrap">${btns}</div></div>`;
}
function buildMJ(s){
  return `<div>
    <div class="mj-toggle">
      <div class="mj-toggle-left">
        <svg class="mj-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="mj-label">Info MJ uniquement — cliquer pour révéler</span>
      </div>
      <span class="mj-caret">▼</span>
    </div>
    <div class="mj-reveal">${s}</div>
  </div>`;
}

/* ════════════════════════════════
   LIST TAB — build once
════════════════════════════════ */
(function buildList(){
  const grid=document.getElementById('list-grid');
  let lastZone='';

  SEGMENTS.forEach((seg,i)=>{
    if(seg.zone!==lastZone){
      lastZone=seg.zone;
      const zh=document.createElement('div');
      zh.className='zone-header'; zh.textContent=seg.zone;
      grid.appendChild(zh);
    }

    const row=document.createElement('div');
    row.className='list-row';

    const dc=dotClass(seg.sign);
    row.innerHTML=`
      <div class="list-row-head">
        <div class="list-dot ${dc}"></div>
        <div class="list-title">${seg.title}</div>
        <span class="list-caret">▼</span>
      </div>
      <div class="list-body">
        <p class="list-info">${seg.info}</p>
        ${seg.choices ? buildChoices(seg.choices) : ''}
        ${seg.mjSecret ? buildMJ(seg.mjSecret) : ''}
      </div>`;

    row.querySelector('.list-row-head').addEventListener('click',()=>{
      row.classList.toggle('open');
    });
    wireCard(row, seg);
    grid.appendChild(row);
  });
})();
</script>
</body>
