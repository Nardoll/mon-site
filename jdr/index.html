<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeux de rôle — Accueil</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="main-content" id="main-content" style="display:none">
    <div class="page-header">
      <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
        <h1 class="page-title">🎲 Jeux de rôle</h1>
        <span class="badge-dev">🚧 En développement</span>
      </div>
      <p class="page-subtitle">Espace de jeu, d'outils et d'archives</p>
    </div>

    <div class="welcome-grid">
      <a href="/jdr/archives.html" class="welcome-link-card">
        <span class="welcome-link-card-icon">📁</span>
        <div class="welcome-link-card-title">Archives</div>
        <div class="welcome-link-card-desc">Notes de campagne, comptes rendus de sessions, personnages et lieux.</div>
        <span class="welcome-link-card-arrow">→</span>
      </a>
      <a href="/jdr/outils.html" class="welcome-link-card">

        <span class="welcome-link-card-arrow">→</span>
      </a>
    </div>
  </main>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { initNav } from './js/nav.js';
    requireAuth(() => {
      document.getElementById('main-content').style.display = '';
      initNav('accueil');
    });
  </script>

</html>
