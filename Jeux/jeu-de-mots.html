<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Mots — Jeux</title>
  <style>
    :root {
      --accent: #667eea;
      --accent-dark: #5568d3;
      --green: #28a745;
      --orange: #ffc107;
      --red: #dc3545;
      --teal: #17a2b8;
      --grey: #6c757d;
      --border: #dee2e6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .top-bar {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .back-link {
      color: rgba(255,255,255,.8);
      text-decoration: none;
      font-size: .88rem;
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      transition: color .15s;
    }
    .back-link:hover { color: #fff; }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      max-width: 600px;
      width: 100%;
      padding: 36px 40px;
      max-height: 90vh;
      overflow-y: auto;
    }
    h1 { text-align: center; color: var(--accent); margin-bottom: 28px; font-size: 1.9em; }
    .section-h2 { text-align: center; color: #495057; margin-bottom: 16px; font-size: 1.15em; }
    .section-desc { text-align: center; color: var(--grey); font-size: .88em; margin-bottom: 20px; line-height: 1.5; }

    /* ── Player count ── */
    .player-count-buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 16px 0 24px;
    }
    .player-count-btn {
      background: #f8f9fa;
      border: 3px solid var(--border);
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
      font-size: 1.15em;
      font-weight: bold;
      color: #495057;
      text-align: center;
    }
    .player-count-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
    .player-count-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Names ── */
    .names-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .name-label { font-size: .76em; color: #6c757d; margin-bottom: 4px; font-weight: 600; }
    .name-input {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: .95em;
      font-family: inherit;
      transition: border-color .2s;
      color: #495057;
    }
    .name-input:focus { outline: none; border-color: var(--accent); }

    /* ── Difficulty ── */
    .difficulty-selector { display: flex; gap: 10px; flex-direction: column; margin-bottom: 24px; }
    .difficulty-btn {
      background: #f8f9fa;
      border: 3px solid var(--border);
      padding: 16px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: all .2s;
      text-align: left;
    }
    .difficulty-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,.2); }
    .difficulty-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
    .difficulty-title { font-size: 1.1em; font-weight: bold; margin-bottom: 4px; }
    .difficulty-desc { font-size: .86em; opacity: .75; }

    /* ── Buttons ── */
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 13px 28px;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      transition: all .2s;
      width: 100%;
      margin-top: 8px;
      font-family: inherit;
    }
    button:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,.4); }
    button:disabled { background: #adb5bd; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-teal  { background: var(--teal); }  .btn-teal:hover  { background: #138496; }
    .btn-orange{ background: var(--orange); color: #000; } .btn-orange:hover { background: #e0a800; }
    .btn-grey  { background: var(--grey); }  .btn-grey:hover  { background: #5a6268; }
    .nav-buttons { display: flex; gap: 10px; margin-top: 12px; }
    .nav-buttons button { flex: 1; }

    /* ── Party view ── */
    .party-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .btn-copy-link {
      background: white;
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: .84em;
      cursor: pointer;
      font-family: inherit;
      width: auto;
      margin-top: 0;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-copy-link:hover { background: var(--accent); color: white; transform: none; box-shadow: none; }
    .party-player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin: 18px 0;
    }
    .party-player-card {
      background: #f8f9fa;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }
    .party-player-name {
      font-size: .95em;
      font-weight: 700;
      color: #495057;
      margin-bottom: 10px;
    }
    .party-word-container {
      position: relative;
      background: white;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px 10px;
      cursor: pointer;
      user-select: none;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
      overflow: hidden;
    }
    .party-word-container:hover { border-color: var(--accent); }
    .party-word-text {
      font-size: 1.3em;
      font-weight: bold;
      color: var(--accent);
      filter: blur(7px);
      transition: filter .3s;
      word-break: break-word;
    }
    .party-word-text.revealed { filter: none; }
    .party-word-hint {
      position: absolute;
      font-size: .78em;
      color: #888;
      pointer-events: none;
      background: white;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .party-word-hint.gone { display: none; }

    /* ── Badges ── */
    .difficulty-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .82em;
      font-weight: bold;
    }
    .badge-facile   { background: var(--green);  color: white; }
    .badge-difficile{ background: var(--orange); color: #000; }
    .badge-expert   { background: var(--red);    color: white; }

    /* ── History ── */
    .history-list { margin-top: 14px; }
    .history-item {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
      border-left: 5px solid var(--accent);
    }
    .history-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 2px;
    }
    .history-item h3 { color: #495057; font-size: .95em; }
    .history-link { font-size: .8em; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .history-link:hover { text-decoration: underline; }
    .history-words {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .history-word { background: white; padding: 10px; border-radius: 8px; text-align: center; }
    .history-word-label { font-size: .8em; color: var(--grey); margin-bottom: 4px; }
    .history-word-text {
      font-size: .97em;
      font-weight: bold;
      color: var(--accent);
      filter: blur(5px);
      cursor: pointer;
      user-select: none;
      transition: filter .25s;
      word-break: break-word;
    }
    .history-word-text.revealed { filter: none; cursor: default; }
    .history-word-hint { font-size: .7em; color: #bbb; margin-top: 2px; }
    .no-history { text-align: center; color: var(--grey); padding: 36px; font-style: italic; }
    .history-loading { text-align: center; color: var(--grey); padding: 24px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #333;
      color: white;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: .9em;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Generic messages ── */
    .load-msg   { text-align: center; color: var(--grey); padding: 3rem 1rem; }
    .error-msg  { text-align: center; color: var(--red);  padding: 2rem 1rem; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/Jeux/" class="back-link">← Jeux</a>
  </div>
  <div class="toast" id="toast"></div>

  <div class="container">
    <h1>🎯 Jeu de Mots</h1>

    <!-- ── Setup ── -->
    <div id="setupSection">
      <h2 class="section-h2">Combien de joueurs ?</h2>
      <div class="player-count-buttons" id="playerCountButtons"></div>

      <div id="namesWrapper" style="display:none">
        <h2 class="section-h2">Prénoms des joueurs</h2>
        <div class="names-grid" id="namesGrid"></div>

        <h2 class="section-h2">Difficulté</h2>
        <div class="difficulty-selector" id="difficultySelector">
          <div class="difficulty-btn" data-diff="facile">
            <div class="difficulty-title">😊 Facile</div>
            <div class="difficulty-desc">Mots courants, faciles à amener en conversation</div>
          </div>
          <div class="difficulty-btn" data-diff="difficile">
            <div class="difficulty-title">🤔 Difficile</div>
            <div class="difficulty-desc">Mots plus pointus et spécifiques</div>
          </div>
          <div class="difficulty-btn" data-diff="expert">
            <div class="difficulty-title">🔥 Expert</div>
            <div class="difficulty-desc">Mots très techniques et obscurs</div>
          </div>
        </div>
      </div>

      <button id="createPartyBtn" disabled>🎲 Créer la partie</button>
      <div class="nav-buttons">
        <button class="btn-teal" id="btnShowHistorySetup">📜 Historique</button>
      </div>
    </div>

    <!-- ── Partie ── -->
    <div id="partySection" style="display:none">
      <div id="partySectionContent"></div>
    </div>

    <!-- ── Historique ── -->
    <div id="historySection" style="display:none">
      <h2 class="section-h2">📜 Historique des parties</h2>
      <div class="history-list" id="historyList"></div>
      <button class="btn-grey" id="btnBackFromHistory">← Retour</button>
    </div>
  </div>

  <script type="module">
    import { collection, addDoc, getDoc, getDocs, doc, query, orderBy, limit, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { db } from "./firebase-config.js";

    // ── Mots ─────────────────────────────────────────────────────────────

        "moteur","roue","volant","frein","pédale","siège","ceinture","phare",

        "ballon","raquette","filet","terrain","stade","piscine","gymnase",

        "empirisme","rationalisme","dialectique","paradoxe","sophisme",

        "pyramide","volume","surface","périmètre","diamètre","tangente",
        "symétrie","translation","rotation","proportion","vecteur","matrice",
        "fréquence","période","phase","amplitude","longueur d'onde","spectre",
        "diffraction","interférence","réfraction","quantum","photon",

      ],
      expert: [
        "péristaltisme","xénomorphe","quinconce","théodicée","apophénie",
        "pareidolie","synesthésie","prosopagnosie","akathisie","dyskinésie",

        "nécroptose","autophagie","ubiquitination","méthylation","épigénétique",
        "transcriptome","protéome","métabolome","phylogénétique","cladistique",

        "mimesis","monade","monisme","noèse","noumène","panentheisme",
        "panpsychisme","périagogé","phronèsis","pneuma","poiesis","praxis",
        "protension","quiddité","réification","samsara","scholastique",
        "sémiotique","sophrosyne","symbole","syncrétisme","synergie",
        "tautologie","techné","temporalité","théurgie","thomisme","transcendance",
        "acatalectique","adoxographie","anamorphose","apocope","apophonie",
        "assonance","cadence","césure","dactyle","diérèse","distique",
        "hémistiche","hiatus","iambe","isocolon","monostiche","onomatopée",
        "paronomase","pentamètre","quaternaire","rime","rythme","scansion",
        "strophe","synalèphe","syncope","synérèse","tercet","tétramètre",
        "trochée","versification","anapeste","choriambe","crétique","ionique"
      ]
    };

    const BADGES = {
      facile:    '<span class="difficulty-badge badge-facile">😊 Facile</span>',
      difficile: '<span class="difficulty-badge badge-difficile">🤔 Difficile</span>',
      expert:    '<span class="difficulty-badge badge-expert">🔥 Expert</span>',
    };

    // ── State ─────────────────────────────────────────────────────────────
    let selectedCount = 0;
    let selectedDiff  = null;
    let historyFrom   = "setup";

    // ── Init ─────────────────────────────────────────────────────────────
    const partieId = new URLSearchParams(window.location.search).get("partie");
    if (partieId) {
      loadParty(partieId);
    } else {
      show("setupSection");
    }

    // ── Show section ──────────────────────────────────────────────────────
    function show(id) {
      ["setupSection","partySection","historySection"].forEach(s => {
        document.getElementById(s).style.display = s === id ? "block" : "none";
      });
    }

    // ── Setup : player count ──────────────────────────────────────────────
    const countContainer = document.getElementById("playerCountButtons");
    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement("div");
      btn.className = "player-count-btn";
      btn.textContent = i;
      btn.addEventListener("click", () => {
        document.querySelectorAll(".player-count-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedCount = i;
        buildNamesGrid(i);
        checkReady();
      });
      countContainer.appendChild(btn);
    }

    function buildNamesGrid(count) {
      const wrapper = document.getElementById("namesWrapper");
      const grid    = document.getElementById("namesGrid");
      wrapper.style.display = "block";
      grid.innerHTML = "";
      for (let i = 0; i < count; i++) {
        grid.innerHTML += `
          <div>
            <div class="name-label">Joueur ${i + 1}</div>
            <input class="name-input" type="text" placeholder="Prénom…" maxlength="24" id="name-${i}">
          </div>`;
      }
    }

    // ── Setup : difficulty ────────────────────────────────────────────────
    document.getElementById("difficultySelector").addEventListener("click", e => {
      const btn = e.target.closest(".difficulty-btn");
      if (!btn) return;
      document.querySelectorAll(".difficulty-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedDiff = btn.dataset.diff;
      checkReady();
    });

    function checkReady() {
      document.getElementById("createPartyBtn").disabled = !(selectedCount > 0 && selectedDiff);
    }

    // ── Create party ──────────────────────────────────────────────────────
    document.getElementById("createPartyBtn").addEventListener("click", async () => {
      if (!selectedCount || !selectedDiff) return;
      const names = [];
      for (let i = 0; i < selectedCount; i++) {
        const val = (document.getElementById(`name-${i}`)?.value || "").trim();
        names.push(val || `Joueur ${i + 1}`);
      }
      const wordPool = [...WORDS[selectedDiff]].sort(() => Math.random() - .5);
      const joueurs  = names.map((nom, i) => ({ nom, mot: wordPool[i] }));

      const btn = document.getElementById("createPartyBtn");
      btn.disabled  = true;
      btn.textContent = "Création…";
      try {
        const ref = await addDoc(collection(db, "jeu_mots_parties"), {
          date: serverTimestamp(),
          difficulte: selectedDiff,
          joueurs,
        });
        window.location.href = `jeu-de-mots.html?partie=${ref.id}`;
      } catch (e) {
        console.error(e);
        btn.disabled  = false;
        btn.textContent = "🎲 Créer la partie";
        showToast("Erreur lors de la création. Réessaie.");
      }
    });

    // ── Load & render party ───────────────────────────────────────────────
    async function loadParty(id) {
      show("partySection");
      document.getElementById("partySectionContent").innerHTML =
        '<div class="load-msg">Chargement de la partie…</div>';
      try {
        const snap = await getDoc(doc(db, "jeu_mots_parties", id));
        if (!snap.exists()) {
          document.getElementById("partySectionContent").innerHTML =
            '<div class="error-msg">Partie introuvable.</div>' +
            '<button class="btn-grey" onclick="location.href=\'jeu-de-mots.html\'" style="margin-top:12px">← Nouvelle partie</button>';
          return;
        }
        renderParty(snap.data());
      } catch (e) {
        document.getElementById("partySectionContent").innerHTML =
          '<div class="error-msg">Erreur de chargement.</div>';
        console.error(e);
      }
    }

    function renderParty(data) {
      const joueurs = data.joueurs || [];
      const diff    = data.difficulte || "facile";
      const cards   = joueurs.map((j, i) => `
        <div class="party-player-card">
          <div class="party-player-name">👤 ${escHtml(j.nom)}</div>
          <div class="party-word-container" id="pwc-${i}" onclick="toggleWord(${i})">
            <span class="party-word-text" id="pwt-${i}">${escHtml(j.mot)}</span>
            <span class="party-word-hint" id="pwh-${i}">👁️ Révéler</span>
          </div>
        </div>`).join("");

      document.getElementById("partySectionContent").innerHTML = `
        <div class="party-header">
          <div>${BADGES[diff] ?? ""}</div>
          <button class="btn-copy-link" id="copyLinkBtn">🔗 Partager le lien</button>
        </div>
        <p class="section-desc">Chaque joueur clique sur sa case pour révéler son mot.<br>Partagez le lien pour jouer sur plusieurs appareils.</p>
        <div class="party-player-grid">${cards}</div>
        <div class="nav-buttons">
          <button class="btn-teal" onclick="openHistoryFromParty()">📜 Historique</button>
          <button class="btn-orange" onclick="location.href='jeu-de-mots.html'">🔄 Nouvelle partie</button>
        </div>`;

      document.getElementById("copyLinkBtn").addEventListener("click", () => {
        const url = window.location.href;
        navigator.clipboard.writeText(url)
          .then(() => showToast("Lien copié !"))
          .catch(() => prompt("Copie ce lien :", url));
      });
    }

    window.toggleWord = function(i) {
      const text = document.getElementById(`pwt-${i}`);
      const hint = document.getElementById(`pwh-${i}`);
      if (text.classList.contains("revealed")) {
        text.classList.remove("revealed");
        hint.classList.remove("gone");
        hint.textContent = "👁️ Révéler";
      } else {
        text.classList.add("revealed");
        hint.classList.add("gone");
      }
    };

    // ── History ───────────────────────────────────────────────────────────
    window.openHistoryFromParty = function() {
      historyFrom = "party";
      openHistory();
    };
    document.getElementById("btnShowHistorySetup").addEventListener("click", () => {
      historyFrom = "setup";
      openHistory();
    });
    document.getElementById("btnBackFromHistory").addEventListener("click", () => {
      if (historyFrom === "party") {
        show("partySection");
      } else {
        show("setupSection");
      }
    });

    async function openHistory() {
      show("historySection");
      const list = document.getElementById("historyList");
      list.innerHTML = '<div class="history-loading">Chargement…</div>';
      try {
        const snap = await getDocs(query(
          collection(db, "jeu_mots_parties"),
          orderBy("date", "desc"),
          limit(30)
        ));
        if (snap.empty) {
          list.innerHTML = '<div class="no-history">Aucune partie enregistrée.</div>';
          return;
        }
        list.innerHTML = snap.docs.map((docSnap, idx) => {
          const g  = docSnap.data();
          const id = docSnap.id;
          const dateObj = g.date?.toDate ? g.date.toDate() : new Date();
          const dateStr = dateObj.toLocaleDateString("fr-FR", {
            day: "2-digit", month: "long", year: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
          const nb = g.joueurs?.length ?? 0;
          const wordsHTML = (g.joueurs || []).map(j => `
            <div class="history-word">
              <div class="history-word-label">${escHtml(j.nom)}</div>
              <div class="history-word-text" onclick="revealHistoryWord(this)">${escHtml(j.mot)}</div>
              <div class="history-word-hint">cliquer pour voir</div>
            </div>`).join("");
          return `
            <div class="history-item">
              <div class="history-item-header">
                <h3>${dateStr} ${BADGES[g.difficulte] ?? ""}</h3>
                <a href="jeu-de-mots.html?partie=${id}" class="history-link">Ouvrir →</a>
              </div>
              <p style="color:var(--grey);font-size:.83em;margin-top:2px">${nb} joueur${nb > 1 ? "s" : ""}</p>
              <div class="history-words">${wordsHTML}</div>
            </div>`;
        }).join("");
      } catch (e) {
        list.innerHTML = '<div class="no-history">Erreur de chargement.</div>';
        console.error(e);
      }
    }

    window.revealHistoryWord = function(el) {
      el.classList.add("revealed");
      const hint = el.nextElementSibling;
      if (hint) hint.style.display = "none";
    };

    // ── Utils ─────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
