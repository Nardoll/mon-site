    const log = document.getElementById('log');
    function addLog(msg, type = '') {
      const p = document.createElement('p');
      p.style.margin = '2px 0';
      p.className = type;
      p.textContent = msg;
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;
    }

    document.getElementById('btn').addEventListener('click', async () => {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Insertion…';
      log.innerHTML = '';

      try {
        // Mettre à jour les équipes du tournoi
        await updateDoc(doc(db, 'prono_tournaments', TOURNAMENT_ID), {
          teams: TEAMS,
          status: 'live'
        });
        addLog('✓ Tournoi mis à jour (équipes + statut live)', 'ok');

        // Insérer les matchs
        let ok = 0, skip = 0;
        for (const m of MATCHES) {
          try {
            const { id, ...data } = m;
            await setDoc(doc(db, 'prono_matches', id), {
              ...data,
              tournament_id: TOURNAMENT_ID
            }, { merge: true });
            addLog(`✓ ${m.round} : ${m.team1} vs ${m.team2}`, 'ok');
            ok++;
          } catch (e) {
            addLog(`✗ Erreur ${m.id} : ${e.message}`, 'err');
            skip++;
          }
        }

        addLog(`\n✓ Terminé — ${ok} matchs insérés, ${skip} erreurs`, 'ok');
        btn.textContent = '✓ Fait !';
      } catch (e) {
        addLog('✗ Erreur fatale : ' + e.message, 'err');
        btn.disabled = false;
        btn.textContent = 'Insérer les matchs →';
      }
    });
