<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réunions — Club de lecture</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Réunions</h1>
      <button class="btn btn-primary" id="btn-add-reunion">+ Ajouter une réunion</button>
    </div>

    <div id="reunions-list">
      <div class="loading">Chargement…</div>
    </div>
  </main>

  <!-- Modal détail réunion -->
  <div class="overlay hidden" id="detail-overlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 id="detail-title">Réunion</h2>
        <div style="display:flex;gap:.5rem;align-items:center">
          <button class="btn btn-secondary btn-sm" id="detail-edit">✏️ Modifier</button>
          <button class="modal-close" id="detail-close">✕</button>
        </div>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Modal ajouter / modifier réunion -->
  <div class="overlay hidden" id="form-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="form-title">Ajouter une réunion</h2>
        <button class="modal-close" id="form-close">✕</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Statut</label>
          <select id="r-statut">
            <option value="prevue">Prévue</option>
            <option value="passee">Passée</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date <span style="color:var(--muted);font-weight:400">(optionnel)</span></label>
          <input type="date" id="r-date">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Mois</label>
          <select id="r-mois">
            <option value="1">Janvier</option><option value="2">Février</option>
            <option value="3">Mars</option><option value="4">Avril</option>
            <option value="5">Mai</option><option value="6">Juin</option>
            <option value="7">Juillet</option><option value="8">Août</option>
            <option value="9">Septembre</option><option value="10">Octobre</option>
            <option value="11">Novembre</option><option value="12">Décembre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Année</label>
          <input type="number" id="r-annee" min="2020" max="2099">
        </div>
      </div>

      <div class="form-group">
        <label>Livre associé</label>
        <div id="r-livre-display" style="font-size:.85rem;color:var(--muted);padding:.25rem 0;min-height:1.4em">
          Sera automatiquement rempli depuis le mois sélectionné
        </div>
      </div>

      <div class="form-group">
        <label>Présents à la réunion</label>
        <div class="check-list" id="r-membres-list"></div>
      </div>

      <div class="form-group">
        <label>Ont lu le livre</label>
        <div class="check-list" id="r-lecteurs-list"></div>
      </div>

      <div class="form-group">
        <label>Compte rendu <span style="color:var(--muted);font-weight:400">(optionnel)</span></label>
        <textarea id="r-compte-rendu" rows="5" style="resize:vertical"
          placeholder="Notes, sujets abordés, impressions du groupe…"></textarea>
      </div>

      <div class="form-group">
        <label>Lien vidéo <span style="color:var(--muted);font-weight:400">(optionnel)</span></label>
        <input type="url" id="r-lien-video" placeholder="https://youtube.com/…">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" id="form-cancel">Annuler</button>
        <button class="btn btn-primary" id="form-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/reunions.js"></script>
</body>
</html>
