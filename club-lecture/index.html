<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil — Club de lecture</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Accueil</h1>
    </div>

    <!-- Frise chronologique -->
    <div id="frise-section"></div>

    <!-- Livre du mois -->
    <div id="current-book-section" style="margin-bottom:2.5rem">
      <div class="loading">Chargement…</div>
    </div>

    <!-- Palmarès / Podium -->
    <div class="section-title">Palmarès</div>
    <div id="podium-section">
      <div class="loading">Chargement…</div>
    </div>
  </main>

  <!-- Modal statut de lecture -->
  <div class="overlay hidden" id="statut-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="statut-modal-title">Mettre à jour mon statut</h2>
        <button class="modal-close" id="statut-modal-close">✕</button>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="statut-select">
          <option value="pas_commence">Pas commencé</option>
          <option value="achete">Acheté</option>
          <option value="en_cours">En cours</option>
          <option value="termine">Terminé</option>
        </select>
      </div>
      <!-- Suivi simple -->
      <div id="statut-simple-section">
        <div class="form-row">
          <div class="form-group">
            <label id="label-page-actuelle">Page actuelle</label>
            <input type="number" id="page-actuelle" min="0" placeholder="0">
          </div>
          <div class="form-group">
            <label id="label-pages-totales">Pages totales</label>
            <input type="number" id="pages-totales" min="0" placeholder="0">
          </div>
        </div>
      </div>
      <!-- Suivi hiérarchique -->
      <div id="statut-hier-section" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label>Partie</label>
            <select id="statut-partie"></select>
          </div>
          <div class="form-group">
            <label>Chapitre</label>
            <input type="number" id="statut-chapitre" min="1" placeholder="1">
          </div>
        </div>
        <div id="statut-position-hint" style="font-size:.75rem;color:var(--muted);margin-top:-.25rem;min-height:1rem"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="statut-modal-cancel">Annuler</button>
        <button class="btn btn-primary" id="statut-modal-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal configuration du suivi de progression -->
  <div class="overlay hidden" id="progression-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Configurer le suivi</h2>
        <button class="modal-close" id="progression-close">✕</button>
      </div>
      <!-- Mode -->
      <div class="form-group">
        <label>Mode</label>
        <div style="display:flex;gap:1.5rem;margin-top:.3rem">
          <label style="cursor:pointer;display:flex;align-items:center;gap:.4rem;font-weight:400">
            <input type="radio" name="prog-mode" id="prog-mode-simple" value="simple"> Simple
          </label>
          <label style="cursor:pointer;display:flex;align-items:center;gap:.4rem;font-weight:400">
            <input type="radio" name="prog-mode" id="prog-mode-hier" value="hierarchique"> Hiérarchique
          </label>
        </div>
      </div>
      <!-- Simple -->
      <div id="prog-simple-section">
        <div class="form-group">
          <label>Unité de suivi</label>
          <input type="text" id="progression-unite" list="unite-suggestions" placeholder="pages, chapitres, parties…">
          <datalist id="unite-suggestions">
            <option value="pages">
            <option value="chapitres">
            <option value="parties">
            <option value="%">
          </datalist>
        </div>
        <div class="form-group">
          <label>Total <span style="color:var(--muted);font-weight:400">(facultatif)</span></label>
          <input type="number" id="progression-total-input" min="1" placeholder="ex : 300">
        </div>
      </div>
      <!-- Hiérarchique -->
      <div id="prog-hier-section" class="hidden">
        <div style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">Indiquez le nombre de chapitres de chaque partie.</div>
        <div id="prog-parties-list"></div>
        <button class="btn btn-ghost btn-sm" id="prog-add-partie" style="margin-top:.4rem">+ Ajouter une partie</button>
        <div id="prog-total-hint" style="font-size:.78rem;color:var(--muted);margin-top:.6rem;min-height:1rem"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="progression-cancel">Annuler</button>
        <button class="btn btn-primary" id="progression-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal ajouter un commentaire de lecture -->
  <div class="overlay hidden" id="commentaire-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Laisser un commentaire</h2>
        <button class="modal-close" id="comm-close">✕</button>
      </div>
      <div class="form-group">
        <label>Membre <span style="color:var(--red)">*</span></label>
        <select id="comm-membre"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="comm-date">
        </div>
        <div class="form-group">
          <label id="comm-advance-label">Avancement</label>
          <input type="number" id="comm-advance" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
          <input type="checkbox" id="comm-titre-toggle"> Ajouter un titre (optionnel)
        </label>
        <div id="comm-titre-wrap" class="hidden" style="margin-top:.5rem">
          <input type="text" id="comm-titre" placeholder="Titre de votre commentaire">
          <div style="font-size:.74rem;color:var(--muted);margin-top:.3rem">⚠️ Le titre est visible sans cliquer — aucun spoiler !</div>
        </div>
      </div>
      <div class="form-group">
        <label>Commentaire <span style="color:var(--red)">*</span></label>
        <textarea id="comm-text" rows="6" placeholder="Votre ressenti, hypothèses, émotions… (attention aux spoilers !)" style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="comm-cancel">Annuler</button>
        <button class="btn btn-primary" id="comm-save">Publier</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/accueil.js"></script>
</body>
</html>
