<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil — Club de lecture</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Accueil</h1>
    </div>

    <!-- Frise chronologique -->
    <div id="frise-section"></div>

    <!-- Livre du mois -->
    <div id="current-book-section" style="margin-bottom:2.5rem">
      <div class="loading">Chargement…</div>
    </div>

    <!-- Chronologie livres élus -->
    <div class="section-title">Chronologie des livres élus</div>
    <div id="timeline-section">
      <div class="loading">Chargement…</div>
    </div>
  </main>

  <!-- Modal statut de lecture -->
  <div class="overlay hidden" id="statut-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="statut-modal-title">Mettre à jour mon statut</h2>
        <button class="modal-close" id="statut-modal-close">✕</button>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="statut-select">
          <option value="pas_commence">Pas commencé</option>
          <option value="achete">Acheté</option>
          <option value="en_cours">En cours</option>
          <option value="termine">Terminé</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label id="label-page-actuelle">Pages actuelle</label>
          <input type="number" id="page-actuelle" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label id="label-pages-totales">Pages totales</label>
          <input type="number" id="pages-totales" min="0" placeholder="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="statut-modal-cancel">Annuler</button>
        <button class="btn btn-primary" id="statut-modal-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal configuration du suivi de progression -->
  <div class="overlay hidden" id="progression-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Configurer le suivi</h2>
        <button class="modal-close" id="progression-close">✕</button>
      </div>
      <div class="form-group">
        <label>Unité de suivi</label>
        <input type="text" id="progression-unite" list="unite-suggestions" placeholder="pages, chapitres, parties…">
        <datalist id="unite-suggestions">
          <option value="pages">
          <option value="chapitres">
          <option value="parties">
          <option value="%">
        </datalist>
      </div>
      <div class="form-group">
        <label>Total <span style="color:var(--muted);font-weight:400">(facultatif)</span></label>
        <input type="number" id="progression-total-input" min="1" placeholder="ex : 300">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="progression-cancel">Annuler</button>
        <button class="btn btn-primary" id="progression-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal ajouter un commentaire de lecture -->
  <div class="overlay hidden" id="commentaire-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Laisser un commentaire</h2>
        <button class="modal-close" id="comm-close">✕</button>
      </div>
      <div class="form-group">
        <label>Membre <span style="color:var(--red)">*</span></label>
        <select id="comm-membre"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="comm-date">
        </div>
        <div class="form-group">
          <label id="comm-advance-label">Avancement</label>
          <input type="number" id="comm-advance" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label>Commentaire <span style="color:var(--red)">*</span></label>
        <textarea id="comm-text" rows="6" placeholder="Votre ressenti, hypothèses, émotions… (attention aux spoilers !)" style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="comm-cancel">Annuler</button>
        <button class="btn btn-primary" id="comm-save">Publier</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/accueil.js"></script>
</body>
</html>
