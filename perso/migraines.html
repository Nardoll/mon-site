<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migraines ophtalmiques — Espace personnel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Migraines ophtalmiques</h1>
      <button class="btn btn-primary" id="btn-add">+ Ajouter</button>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Graphique -->
    <div class="card" style="margin-bottom:1.75rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
        <div class="card-title" style="margin-bottom:0">Évolution dans le temps</div>
        <div class="tab-bar" style="margin-bottom:0" id="unit-tabs">
          <button class="tab-btn" data-unit="day">Jours</button>
          <button class="tab-btn active" data-unit="month">Mois</button>
          <button class="tab-btn" data-unit="year">Années</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-migraines"></canvas>
      </div>
      <div id="chart-empty" class="hidden" style="text-align:center;color:var(--muted2);padding:2rem;font-size:.85rem">
        Aucune donnée à afficher.
      </div>
    </div>

    <!-- Tableau historique -->
    <div class="card">
      <div class="card-title">Historique</div>
      <div id="table-container"><div class="loading">Chargement…</div></div>
    </div>
  </main>

  <!-- Modal ajouter / modifier -->
  <div class="overlay hidden" id="form-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="form-title">Ajouter une migraine</h2>
        <button class="modal-close" id="form-close">✕</button>
      </div>

      <div class="form-group">
        <label>Date <span style="color:var(--red)">*</span></label>
        <input type="date" id="f-date">
      </div>

      <div class="form-group">
        <label>Commentaire <span style="color:var(--muted2);font-weight:400">(optionnel)</span></label>
        <textarea id="f-commentaire" rows="4" placeholder="Contexte, intensité, durée, déclencheur…"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" id="form-cancel">Annuler</button>
        <button class="btn btn-primary" id="form-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmer suppression -->
  <div class="overlay hidden" id="del-overlay">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <h2>Supprimer</h2>
        <button class="modal-close" id="del-close">✕</button>
      </div>
      <p style="font-size:.88rem;color:var(--muted2);margin-bottom:1.25rem">
        Supprimer définitivement cette migraine ? Cette action est irréversible.
      </p>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="del-cancel">Annuler</button>
        <button class="btn btn-danger" id="del-confirm">Supprimer</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/migraines.js"></script>
</body>
</html>
