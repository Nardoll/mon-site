<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Discord</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --border: #232323;
      --text: #d8d8d8;
      --muted2: #7a7a7a;
      --accent: #5865f2;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      gap: 1.5rem;
    }

    .icon { font-size: 3rem; }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #efefef;
      letter-spacing: -.02em;
    }

    p {
      color: var(--muted2);
      font-size: .93rem;
      text-align: center;
      max-width: 380px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .75rem;
      font-weight: 600;
      padding: .35em .85em;
      border-radius: 6px;
      background: rgba(74,74,74,.18);
      color: var(--muted2);
      border: 1px solid rgba(74,74,74,.3);
    }

    .back {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      font-size: .8rem;
      color: var(--muted2);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .35rem;
      transition: color .15s;
    }
    .back:hover { color: var(--text); }
  </style>
</head>
<body>

  <a href="/" class="back">← Accueil</a>

  <div class="icon">📊</div>
  <h1>Data Discord</h1>
  <p>Cette section est en cours de construction. Elle présentera des statistiques et visualisations à partir des données du serveur Discord.</p>
  <span class="badge">🚧 En construction</span>

</body>
</html>
