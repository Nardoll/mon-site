<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Discord</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #313338; --sidebar-bg: #2b2d31; --surface: #383a40; --surface2: #404249;
      --border: #1e1f22; --text: #dbdee1; --muted: #80848e; --accent: #5865f2;
      --sidebar-w: 220px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; display: flex; min-height: 100vh; }
    #sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 1.25rem .75rem; }
    .sidebar-header { display: flex; align-items: center; gap: .6rem; padding: .5rem .5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: .75rem; }
    .sidebar-logo { font-size: 1.4rem; }
    .sidebar-title { font-weight: 700; font-size: .95rem; color: #fff; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .sidebar-section { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: .75rem .75rem .25rem; }
    .sidebar-link { display: flex; align-items: center; gap: .55rem; padding: .55rem .75rem; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: .88rem; font-weight: 500; transition: background .15s, color .15s; }
    .sidebar-link:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .sidebar-link.active { background: rgba(88,101,242,.2); color: #c7caf9; }
    .sidebar-footer { padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
    .sidebar-home { display: block; text-decoration: none; color: var(--muted); font-size: .8rem; padding: .4rem .5rem; border-radius: 5px; transition: color .15s; }
    .sidebar-home:hover { color: var(--text); }

    .main { margin-left: var(--sidebar-w); flex: 1; padding: 2.5rem; }
    .page-title { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: .4rem; }
    .page-sub { font-size: .85rem; color: var(--muted); margin-bottom: 2rem; }

    .servers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; max-width: 800px; }

    .server-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .85rem;
      transition: border-color .15s, background .15s, transform .15s;
      text-align: center;
    }
    .server-card:hover { border-color: rgba(88,101,242,.5); background: var(--surface2); transform: translateY(-2px); }

    .server-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 3px solid rgba(88,101,242,.3);
      flex-shrink: 0;
    }
    .server-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

    .server-name { font-weight: 700; font-size: 1rem; color: #fff; }
    .server-stats { font-size: .78rem; color: var(--muted); }
    .server-badge {
      font-size: .7rem;
      font-weight: 600;
      padding: .2em .6em;
      border-radius: 4px;
      background: rgba(87,242,135,.1);
      color: #86efac;
      border: 1px solid rgba(87,242,135,.2);
    }

    @media (max-width: 640px) { #sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main">
    <div class="page-title">Data Discord</div>
    <div class="page-sub">Sélectionne un serveur pour voir ses statistiques.</div>
    <div class="servers-grid" id="servers-grid">
      <div style="color:var(--muted);font-size:.85rem">Chargement…</div>
    </div>
  </main>

  <script type="module">
    import { db } from './firebase-config.js';
    import { renderNav } from './nav.js';
    import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    async function load() {
      const snap = await getDocs(collection(db, 'discord_serveurs'));
      const servers = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      renderNav('home', servers);

      if (servers.length === 0) {
        document.getElementById('servers-grid').innerHTML =
          '<p style="color:var(--muted);font-size:.85rem">Aucun serveur collecté pour l\'instant.</p>';
        return;
      }

      document.getElementById('servers-grid').innerHTML = servers.map(s => `
        <a href="/data-discord/dashboard.html?id=${s.id}" class="server-card">
          <div class="server-avatar">
            ${(s.icon_url || s.guild_icon_url) ? `<img src="${esc(s.icon_url || s.guild_icon_url)}" alt="${esc(s.nom)}">` : '💬'}
          </div>
          <div>
            <div class="server-name">${esc(s.nom)}</div>
            <div class="server-stats">${s.nb_membres || '—'} membres · ${s.nb_messages || '—'} messages</div>
          </div>
          <span class="server-badge">✓ Collecté</span>
        </a>
      `).join('');
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    load();
  </script>
</body>
</html>
