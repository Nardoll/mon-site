<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Discord — Vue d'ensemble</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #313338; --sidebar-bg: #2b2d31; --surface: #383a40; --surface2: #404249;
      --border: #1e1f22; --text: #dbdee1; --muted: #80848e; --accent: #5865f2;
      --green: #57f287; --yellow: #fee75c; --red: #ed4245;
      --sidebar-w: 220px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    #sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 1.25rem .75rem; overflow-y: auto; }
    .sidebar-header { display: flex; align-items: center; gap: .6rem; padding: .5rem .5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: .75rem; }
    .sidebar-logo { font-size: 1.4rem; }
    .sidebar-title { font-weight: 700; font-size: .95rem; color: #fff; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .sidebar-section { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: .75rem .75rem .25rem; }
    .sidebar-link { display: flex; align-items: center; gap: .55rem; padding: .55rem .75rem; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: .88rem; font-weight: 500; transition: background .15s, color .15s; }
    .sidebar-link:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .sidebar-link.active { background: rgba(88,101,242,.2); color: #c7caf9; }
    .sidebar-link.server-active { color: var(--text); }
    .sidebar-sublink { font-size: .82rem; padding: .4rem .65rem; }
    .sidebar-footer { padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
    .sidebar-home { display: block; text-decoration: none; color: var(--muted); font-size: .8rem; padding: .4rem .5rem; border-radius: 5px; transition: color .15s; }
    .sidebar-home:hover { color: var(--text); }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 2rem 2.5rem; }

    /* ── Server header ── */
    .server-header {
      display: flex; align-items: center; gap: 1.25rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .server-avatar-wrap { position: relative; flex-shrink: 0; }
    .server-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--surface2);
      border: 3px solid rgba(88,101,242,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; overflow: hidden;
    }
    .server-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .btn-edit-icon {
      position: absolute; bottom: -2px; right: -2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; cursor: pointer; color: #fff; transition: background .15s;
    }
    .btn-edit-icon:hover { background: #4752c4; }
    .server-info { flex: 1; }
    .server-name { font-size: 1.4rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: .6rem; }
    .server-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; }
    .server-meta { font-size: .82rem; color: var(--muted); margin-top: .2rem; }

    /* ── Section header ── */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .85rem; }
    .section-title { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

    /* ── Toggle granularité ── */
    .toggle-group { display: flex; background: var(--surface2); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .toggle-btn { padding: .28rem .65rem; font-size: .75rem; font-weight: 600; color: var(--muted); background: none; border: none; cursor: pointer; transition: background .15s, color .15s; }
    .toggle-btn.active { background: var(--accent); color: #fff; }

    /* ── Histogramme ── */
    .chart-section { margin-bottom: 2.5rem; }
    .chart-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem 1.5rem 0;
    }
    .chart-bars {
      display: flex; align-items: flex-end; gap: 3px;
      height: 240px;
      overflow-x: auto; overflow-y: hidden;
      padding-bottom: 28px;
    }
    .chart-bars::-webkit-scrollbar { height: 5px; }
    .chart-bars::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
    .bar-wrap { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex-shrink: 0; position: relative; height: 100%; }
    .bar-col { background: var(--accent); border-radius: 3px 3px 0 0; opacity: .65; transition: opacity .15s; cursor: default; width: 100%; }
    .bar-col:hover { opacity: 1; }
    .bar-lbl { font-size: .65rem; color: var(--muted); white-space: nowrap; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); }

    /* ── Tooltip histogramme ── */
    #chart-tooltip {
      position: fixed; pointer-events: none; z-index: 50;
      background: #1e1f22; border: 1px solid rgba(255,255,255,.12); border-radius: 8px;
      padding: .5rem .75rem; display: none; flex-direction: column; gap: .15rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    #chart-tooltip.visible { display: flex; }
    .tt-date { font-size: .72rem; color: var(--muted); }
    .tt-count { font-size: 1rem; font-weight: 700; color: #fff; }

    /* ── Section cards ── */
    .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .sec-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.4rem 1.5rem;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: .9rem;
      transition: border-color .18s, background .18s, transform .15s;
      cursor: pointer;
    }
    .sec-card:hover { border-color: rgba(88,101,242,.45); background: var(--surface2); transform: translateY(-1px); }
    .sec-card-head { display: flex; align-items: center; justify-content: space-between; }
    .sec-card-title { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; gap: .45rem; }
    .sec-card-arrow { font-size: .9rem; color: var(--muted); transition: color .15s, transform .15s; }
    .sec-card:hover .sec-card-arrow { color: var(--text); transform: translateX(3px); }
    .sec-card-kpi { font-size: 2.8rem; font-weight: 700; color: #fff; line-height: 1; }
    .sec-card-sub { font-size: .78rem; color: var(--muted); }
    .sec-card-extras { display: flex; flex-direction: column; gap: .35rem; margin-top: .1rem; }

    /* mini stats dans les cards */
    .stat-pill { display: flex; align-items: center; gap: .5rem; font-size: .8rem; }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .stat-label { color: var(--muted); flex: 1; }
    .stat-val { color: var(--text); font-weight: 600; }

    /* mini bar dans les cards */
    .mini-bar-row { display: flex; align-items: center; gap: .6rem; font-size: .79rem; }
    .mini-bar-name { color: var(--muted); min-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .mini-bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); opacity: .7; }
    .mini-bar-count { color: var(--text); font-weight: 600; min-width: 36px; text-align: right; flex-shrink: 0; }

    /* types grid dans la card messages */
    .types-inline { display: flex; flex-wrap: wrap; gap: .45rem; }
    .type-badge { display: flex; align-items: center; gap: .35rem; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.07); border-radius: 6px; padding: .3rem .6rem; font-size: .78rem; }
    .type-badge-count { font-weight: 700; color: #fff; }
    .type-badge-lbl { color: var(--muted); }

    /* Icon edit overlay */
    .icon-edit-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
    .icon-edit-overlay.open { display: flex; }
    .icon-edit-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 360px; display: flex; flex-direction: column; gap: 1rem; }
    .icon-edit-box label { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .icon-edit-box input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .88rem; font-family: inherit; padding: .55rem .75rem; outline: none; width: 100%; }
    .icon-edit-box input:focus { border-color: var(--accent); }
    .icon-edit-actions { display: flex; gap: .6rem; justify-content: flex-end; }
    .btn { display: inline-flex; align-items: center; gap: .35rem; padding: .45rem .9rem; border-radius: 6px; font-size: .83rem; font-weight: 600; cursor: pointer; border: none; transition: background .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4752c4; }
    .btn-ghost { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid rgba(255,255,255,.1); }
    .btn-ghost:hover { background: rgba(255,255,255,.1); }

    @media (max-width: 760px) { .cards-grid { grid-template-columns: 1fr; } }
    @media (max-width: 640px) { #sidebar { display: none; } .main { margin-left: 0; padding: 1.25rem; } }
  </style>
</head>
<body>
  <div id="sidebar"></div>

  <main class="main">
    <!-- Header serveur -->
    <div class="server-header">
      <div class="server-avatar-wrap">
        <div class="server-avatar" id="server-avatar">💬</div>
        <div class="btn-edit-icon" id="btn-edit-icon" title="Changer l'icône">✏️</div>
      </div>
      <div class="server-info">
        <div class="server-name"><span class="server-dot"></span><span id="server-name">Chargement…</span></div>
        <div class="server-meta" id="server-meta"></div>
      </div>
    </div>

    <!-- Histogramme d'activité -->
    <div class="chart-section">
      <div class="section-head">
        <div class="section-title">Activité du serveur</div>
        <div class="toggle-group" id="time-toggle">
          <button class="toggle-btn" data-g="week">Semaine</button>
          <button class="toggle-btn active" data-g="month">Mois</button>
          <button class="toggle-btn" data-g="year">Année</button>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart-bars" id="activity-chart"></div>
      </div>
    </div>

    <!-- Cartes de sections -->
    <div class="cards-grid" id="cards-grid"></div>
  </main>

  <!-- Tooltip histogramme -->
  <div id="chart-tooltip"><div class="tt-date"></div><div class="tt-count"></div></div>

  <!-- Éditeur icône -->
  <div class="icon-edit-overlay" id="icon-edit-overlay">
    <div class="icon-edit-box">
      <div style="font-size:.95rem;font-weight:700;color:#fff">Icône du serveur</div>
      <div>
        <label>URL de l'image</label>
        <input type="url" id="icon-url-input" placeholder="https://…" style="margin-top:.4rem" />
      </div>
      <div style="font-size:.75rem;color:var(--muted)">
        Astuce : clic droit sur l'icône du serveur Discord → "Copier le lien de l'image"
      </div>
      <div class="icon-edit-actions">
        <button class="btn btn-ghost" id="btn-icon-cancel">Annuler</button>
        <button class="btn btn-primary" id="btn-icon-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { renderNav } from './nav.js';
    import {
      collection, getDocs, query, where, doc, setDoc, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const params   = new URLSearchParams(location.search);
    const GUILD_ID = params.get('id') || '1499528679758364744';

    let allMessages = [];
    let allMembres  = [];
    let serverData  = {};
    let timeGran    = 'month';

    // ── Chargement ────────────────────────────────────────────────
    async function load() {
      const [msgSnap, mbSnap, srvSnap, srvDoc] = await Promise.all([
        getDocs(query(collection(db, 'discord_messages'),     where('serveur_id', '==', GUILD_ID))),
        getDocs(query(collection(db, 'discord_membres_bot'), where('serveur_id', '==', GUILD_ID))),
        getDocs(query(collection(db, 'discord_serveurs'))),
        getDoc(doc(db, 'discord_serveurs', GUILD_ID))
      ]);

      allMessages = msgSnap.docs.map(d => d.data());
      allMembres  = mbSnap.docs.map(d => d.data());
      serverData  = srvDoc.exists() ? srvDoc.data() : {};

      const allServers = srvSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderNav(GUILD_ID, allServers);

      renderHeader();
      renderActivity();
      renderCards();
    }

    // ── Header ────────────────────────────────────────────────────
    function renderHeader() {
      document.getElementById('server-name').textContent = serverData.nom || 'Serveur Discord';
      document.getElementById('server-meta').textContent =
        `${allMembres.length} membres · ${allMessages.length} messages collectés · dernière collecte : ${serverData.last_collected?.slice(0,10) || '—'}`;

      const iconSrc = serverData.icon_url || serverData.guild_icon_url;
      if (iconSrc) {
        document.getElementById('server-avatar').innerHTML = `<img src="${esc(iconSrc)}" alt="icône">`;
      }
    }

    // ── Histogramme ───────────────────────────────────────────────
    function getKey(dateStr, gran) {
      if (!dateStr) return null;
      if (gran === 'year')  return dateStr.slice(0, 4);
      if (gran === 'month') return dateStr.slice(0, 7);
      const d = new Date(dateStr);
      const jan4 = new Date(d.getFullYear(), 0, 4);
      const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
      return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
    }

    function shortLabel(k) {
      if (k.includes('-W')) { const [y,w] = k.split('-W'); return `S${w} '${y.slice(2)}`; }
      if (k.length === 4) return k;
      const [y, m] = k.split('-');
      return `${'Jan Fév Mar Avr Mai Juin Juil Aoû Sep Oct Nov Déc'.split(' ')[+m-1]} '${y.slice(2)}`;
    }

    function renderActivity() {
      const counts = {};
      allMessages.forEach(m => {
        const k = getKey(m.date, timeGran);
        if (k) counts[k] = (counts[k] || 0) + 1;
      });
      const sorted = Object.entries(counts).sort(([a],[b]) => a.localeCompare(b));
      if (!sorted.length) {
        document.getElementById('activity-chart').innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:2rem">Aucune donnée</div>';
        return;
      }

      const chartEl = document.getElementById('activity-chart');
      // barW adaptatif : remplit le conteneur si peu de données, scroll si beaucoup
      const minBarW = timeGran === 'year' ? 28 : timeGran === 'month' ? 14 : 8;
      const maxBarW = timeGran === 'year' ? 120 : timeGran === 'month' ? 72 : 40;
      const gap = 3;
      const containerW = chartEl.parentElement.clientWidth - 48; // padding 1.5rem × 2
      const n = sorted.length;
      const idealBarW = n > 1 ? Math.floor((containerW - gap * (n - 1)) / n) : containerW;
      const barW = Math.max(minBarW, Math.min(maxBarW, idealBarW));

      const barH  = 210; // hauteur utile (240 - 28 padding bas - 2)
      const max   = Math.max(...sorted.map(([,v]) => v), 1);
      const step  = Math.max(1, Math.ceil(48 / barW));

      chartEl.innerHTML = sorted.map(([k, v], i) => {
        const showLabel = (i % step === 0) || i === n - 1;
        return `
          <div class="bar-wrap" style="width:${barW}px">
            <div class="bar-col" style="height:${Math.max(2, Math.round(v/max*barH))}px"
              data-k="${k}" data-v="${v}"></div>
            ${showLabel ? `<div class="bar-lbl">${shortLabel(k)}</div>` : ''}
          </div>`;
      }).join('');

      // Scroll vers la droite (données récentes)
      chartEl.scrollLeft = chartEl.scrollWidth;
    }

    // ── Tooltip ───────────────────────────────────────────────────
    const tooltip = document.getElementById('chart-tooltip');
    document.getElementById('activity-chart').addEventListener('mouseover', e => {
      const bar = e.target.closest('.bar-col');
      if (!bar) return;
      const k = bar.dataset.k;
      const v = bar.dataset.v;
      tooltip.querySelector('.tt-date').textContent  = shortLabel(k);
      tooltip.querySelector('.tt-count').textContent = `${v} message${v > 1 ? 's' : ''}`;
      tooltip.classList.add('visible');
    });
    document.getElementById('activity-chart').addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 48) + 'px';
    });
    document.getElementById('activity-chart').addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    document.getElementById('time-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      timeGran = btn.dataset.g;
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderActivity();
    });

    // ── Cartes de sections ────────────────────────────────────────
    function renderCards() {
      const grid = document.getElementById('cards-grid');

      // ── Stats globales ────
      const totalMsgs   = allMessages.length;
      const totalMembres = allMembres.length;

      // Membres actifs ce mois
      const thisMonth = new Date().toISOString().slice(0,7);
      const activeThisMonth = new Set(
        allMessages.filter(m => m.date?.slice(0,7) === thisMonth).map(m => m.auteur_id)
      ).size;

      // Salons
      const salonMap = {};
      allMessages.forEach(m => {
        if (!salonMap[m.salon_id]) salonMap[m.salon_id] = { nom: m.salon_nom, count: 0 };
        salonMap[m.salon_id].count++;
      });
      const topSalons = Object.values(salonMap).sort((a,b) => b.count - a.count);
      const totalSalons = topSalons.length;

      // Types de messages
      const typeCounts = {};
      allMessages.forEach(m => { typeCounts[m.type] = (typeCounts[m.type]||0)+1; });
      const typeIcons = { texte:'💬', image:'🖼️', lien:'🔗', video:'🎥', fichier:'📎', sondage:'🗳️', autre:'❓' };

      // Sondages
      const totalSondages = typeCounts['sondage'] || 0;
      const lastSondage   = allMessages.filter(m => m.type === 'sondage').sort((a,b) => b.date > a.date ? 1 : -1)[0];

      // Interactions (Discord replies)
      const totalReplies = allMessages.filter(m => m.est_reponse).length;
      // Qui répond à qui : on n'a pas l'auteur cible dans la collecte actuelle, on compte par auteur
      const replyByAuthor = {};
      allMessages.filter(m => m.est_reponse).forEach(m => {
        replyByAuthor[m.auteur_id] = (replyByAuthor[m.auteur_id]||0)+1;
      });
      const topRepliers = Object.entries(replyByAuthor)
        .sort(([,a],[,b]) => b-a).slice(0,3)
        .map(([id, n]) => {
          const mb = allMembres.find(x => x.discord_id === id);
          return { nom: mb?.display_name || mb?.nom || id.slice(0,8), n };
        });
      const maxReplies = topRepliers[0]?.n || 1;

      // ── Calcul membres actifs 30j ────
      const d30 = new Date(); d30.setDate(d30.getDate()-30);
      const d30str = d30.toISOString().slice(0,10);
      const active30 = new Set(
        allMessages.filter(m => m.date >= d30str).map(m => m.auteur_id)
      ).size;

      // ── HTML des cartes ────
      grid.innerHTML = `

        <!-- Membres -->
        <a href="/data-discord/membres.html?id=${GUILD_ID}" class="sec-card">
          <div class="sec-card-head">
            <div class="sec-card-title">👥 Membres</div>
            <div class="sec-card-arrow">›</div>
          </div>
          <div class="sec-card-kpi">${totalMembres}</div>
          <div class="sec-card-extras">
            <div class="stat-pill">
              <div class="stat-dot" style="background:var(--green)"></div>
              <div class="stat-label">Actifs ces 30 derniers jours</div>
              <div class="stat-val">${active30}</div>
            </div>
            <div class="stat-pill">
              <div class="stat-dot" style="background:var(--accent)"></div>
              <div class="stat-label">Actifs ce mois-ci</div>
              <div class="stat-val">${activeThisMonth}</div>
            </div>
          </div>
        </a>

        <!-- Messages -->
        <div class="sec-card" style="cursor:default">
          <div class="sec-card-head">
            <div class="sec-card-title">💬 Messages</div>
          </div>
          <div class="sec-card-kpi">${totalMsgs.toLocaleString('fr')}</div>
          <div class="types-inline">
            ${['texte','image','lien','sondage','video','fichier','autre']
              .filter(t => typeCounts[t])
              .map(t => `
                <div class="type-badge">
                  <span>${typeIcons[t]||'❓'}</span>
                  <span class="type-badge-count">${typeCounts[t]}</span>
                  <span class="type-badge-lbl">${t[0].toUpperCase()+t.slice(1)}</span>
                </div>`).join('')}
          </div>
        </div>

        <!-- Salons -->
        <a href="/data-discord/salons.html?id=${GUILD_ID}" class="sec-card">
          <div class="sec-card-head">
            <div class="sec-card-title">💬 Salons</div>
            <div class="sec-card-arrow">›</div>
          </div>
          <div class="sec-card-kpi">${totalSalons}</div>
          <div class="sec-card-extras">
            ${topSalons.slice(0,3).map(s => `
              <div class="mini-bar-row">
                <div class="mini-bar-name">#${esc(s.nom || '—')}</div>
                <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(s.count/(topSalons[0]?.count||1)*100)}%"></div></div>
                <div class="mini-bar-count">${s.count}</div>
              </div>`).join('')}
          </div>
        </a>

        <!-- Sondages -->
        <a href="/data-discord/sondages.html?id=${GUILD_ID}" class="sec-card">
          <div class="sec-card-head">
            <div class="sec-card-title">🗳️ Sondages</div>
            <div class="sec-card-arrow">›</div>
          </div>
          <div class="sec-card-kpi">${totalSondages}</div>
          <div class="sec-card-extras">
            ${lastSondage ? `
              <div class="stat-pill">
                <div class="stat-dot"></div>
                <div class="stat-label">Dernier sondage</div>
                <div class="stat-val">${lastSondage.date?.slice(0,10) || '—'}</div>
              </div>` : '<div class="sec-card-sub">Aucun sondage collecté</div>'}
          </div>
        </a>

        <!-- Interactions -->
        <a href="/data-discord/graphe.html?id=${GUILD_ID}" class="sec-card">
          <div class="sec-card-head">
            <div class="sec-card-title">🤝 Interactions</div>
            <div class="sec-card-arrow">›</div>
          </div>
          <div class="sec-card-kpi">${totalReplies}</div>
          <div class="sec-card-sub" style="margin-top:-.4rem">réponses directes</div>
          <div class="sec-card-extras">
            ${topRepliers.length ? topRepliers.map(r => `
              <div class="mini-bar-row">
                <div class="mini-bar-name">${esc(r.nom)}</div>
                <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(r.n/maxReplies*100)}%"></div></div>
                <div class="mini-bar-count">${r.n}</div>
              </div>`).join('') : '<div class="sec-card-sub">Aucune réponse directe</div>'}
          </div>
        </a>

      `;
    }

    // ── Éditeur icône ─────────────────────────────────────────────
    document.getElementById('btn-edit-icon').onclick = () => {
      document.getElementById('icon-url-input').value = serverData.icon_url || '';
      document.getElementById('icon-edit-overlay').classList.add('open');
    };
    document.getElementById('btn-icon-cancel').onclick = () =>
      document.getElementById('icon-edit-overlay').classList.remove('open');
    document.getElementById('btn-icon-save').onclick = async () => {
      const url = document.getElementById('icon-url-input').value.trim();
      serverData.icon_url = url;
      await setDoc(doc(db, 'discord_serveurs', GUILD_ID), { ...serverData, icon_url: url }, { merge: true });
      document.getElementById('server-avatar').innerHTML = url ? `<img src="${esc(url)}" alt="icône">` : '💬';
      document.getElementById('icon-edit-overlay').classList.remove('open');
    };

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    load();
  </script>
</body>
</html>
