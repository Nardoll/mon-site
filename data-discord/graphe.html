<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Discord — Graphe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #313338; --sidebar-bg: #2b2d31; --surface: #383a40; --surface2: #404249;
      --border: #1e1f22; --text: #dbdee1; --muted: #80848e; --accent: #5865f2;
      --sidebar-w: 220px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 1.25rem .75rem; overflow-y: auto; flex-shrink: 0; }
    .sidebar-header { display: flex; align-items: center; gap: .6rem; padding: .5rem .5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: .75rem; }
    .sidebar-logo { font-size: 1.4rem; }
    .sidebar-title { font-weight: 700; font-size: .95rem; color: #fff; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .sidebar-section { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: .75rem .75rem .25rem; }
    .sidebar-link { display: flex; align-items: center; gap: .55rem; padding: .55rem .75rem; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: .88rem; font-weight: 500; transition: background .15s, color .15s; }
    .sidebar-link:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .sidebar-link.active { background: rgba(88,101,242,.2); color: #c7caf9; }
    .sidebar-link.server-active { color: var(--text); }
    .sidebar-sublink { padding-left: 2rem; font-size: .82rem; }
    .sidebar-footer { padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
    .sidebar-home { display: block; text-decoration: none; color: var(--muted); font-size: .8rem; padding: .4rem .5rem; border-radius: 5px; transition: color .15s; }
    .sidebar-home:hover { color: var(--text); }

    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding: .85rem 1.5rem;
      background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar-title { font-weight: 700; font-size: .95rem; color: #fff; margin-right: .5rem; }
    .toolbar-label { font-size: .78rem; color: var(--muted); white-space: nowrap; }
    .slider-wrap { display: flex; align-items: center; gap: .6rem; }
    input[type=range] { accent-color: var(--accent); width: 120px; cursor: pointer; }
    .slider-val { font-size: .82rem; font-weight: 700; color: #c7caf9; min-width: 50px; }
    .toggle-group { display: flex; background: var(--surface2); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .toggle-btn { padding: .28rem .65rem; font-size: .75rem; font-weight: 600; color: var(--muted); background: none; border: none; cursor: pointer; transition: background .15s, color .15s; }
    .toggle-btn.active { background: var(--accent); color: #fff; }
    .stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: .2rem .6rem; font-size: .75rem; color: var(--muted); }
    .stat-chip span { color: #fff; font-weight: 700; }

    /* ── Canvas zone ── */
    #graph-wrap { flex: 1; position: relative; overflow: hidden; }
    #graph-svg { width: 100%; height: 100%; }

    /* ── Tooltip ── */
    #tooltip {
      position: absolute; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem .85rem; font-size: .78rem; color: var(--text);
      pointer-events: none; opacity: 0; transition: opacity .15s;
      max-width: 200px; z-index: 10;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-name { font-weight: 700; color: #fff; margin-bottom: .2rem; }
    #tooltip .tt-line { color: var(--muted); }

    /* ── Légende clusters ── */
    #legend {
      position: absolute; bottom: 1rem; left: 1rem;
      background: rgba(43,45,49,.9); border: 1px solid var(--border);
      border-radius: 10px; padding: .75rem 1rem;
      display: none; flex-direction: column; gap: .35rem;
    }
    #legend.visible { display: flex; }
    .legend-title { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .1rem; }
    .legend-item { display: flex; align-items: center; gap: .5rem; font-size: .78rem; cursor: pointer; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { color: var(--text); }
    .legend-name.editing { background: transparent; border: none; border-bottom: 1px solid var(--accent); color: #fff; font-size: .78rem; font-family: inherit; outline: none; width: 120px; }

    /* ── Panneau latéral membre ── */
    #member-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 280px;
      background: var(--sidebar-bg); border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform .25s;
      display: flex; flex-direction: column; overflow-y: auto;
    }
    #member-panel.open { transform: translateX(0); }
    .panel-header { display: flex; align-items: center; gap: .75rem; padding: 1.1rem 1rem; border-bottom: 1px solid var(--border); }
    .panel-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0; }
    .panel-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .panel-name { font-weight: 700; color: #fff; font-size: .95rem; }
    .panel-sub { font-size: .72rem; color: var(--muted); }
    .btn-close-panel { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; }
    .panel-body { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .panel-section-title { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .conn-row { display: flex; align-items: center; gap: .55rem; padding: .3rem 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .conn-av { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0; }
    .conn-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .conn-name { flex: 1; font-size: .8rem; color: var(--text); }
    .conn-bar-bg { width: 60px; height: 4px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
    .conn-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); }
    .conn-count { font-size: .72rem; color: var(--muted); min-width: 24px; text-align: right; }

    .empty-msg { color: var(--muted); font-size: .82rem; font-style: italic; text-align: center; padding: .75rem 0; }
  </style>
</head>
<body>
  <div id="sidebar"></div>

  <div class="main">
    <div class="toolbar">
      <div class="toolbar-title">🕸️ Graphe des relations</div>
      <div class="slider-wrap">
        <span class="toolbar-label">Fenêtre de conversation :</span>
        <input type="range" id="slider-window" min="5" max="120" step="5" value="30">
        <span class="slider-val" id="slider-label">30 min</span>
      </div>
      <div class="slider-wrap">
        <span class="toolbar-label">Lien min. :</span>
        <input type="range" id="slider-min" min="1" max="20" step="1" value="2">
        <span class="slider-val" id="slider-min-label">2 conv.</span>
      </div>
      <div class="stat-chip" id="stat-nodes">— nœuds</div>
      <div class="stat-chip" id="stat-edges">— liens</div>
    </div>

    <div id="graph-wrap">
      <svg id="graph-svg"></svg>
      <div id="tooltip">
        <div class="tt-name" id="tt-name"></div>
        <div class="tt-line" id="tt-msgs"></div>
        <div class="tt-line" id="tt-links"></div>
      </div>
      <div id="legend">
        <div class="legend-title">Clusters</div>
        <div id="legend-items"></div>
      </div>
      <div id="member-panel">
        <div class="panel-header">
          <div class="panel-avatar" id="panel-avatar"></div>
          <div>
            <div class="panel-name" id="panel-name"></div>
            <div class="panel-sub" id="panel-sub"></div>
          </div>
          <button class="btn-close-panel" id="btn-close-panel">×</button>
        </div>
        <div class="panel-body" id="panel-body"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script type="module">
    import { db } from './firebase-config.js';
    import { renderNav } from './nav.js';
    import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const params   = new URLSearchParams(location.search);
    const GUILD_ID = params.get('id') || '1499528679758364744';

    const CLUSTER_COLORS = ['#5865f2','#57f287','#fee75c','#ed4245','#eb459e','#3ba55d','#faa61a','#00b0f4'];

    let allMessages = [];
    let allMembres  = [];
    let memberMap   = {};
    let windowMin   = 30;
    let minEdge     = 2;
    let clusterNames = {};

    // ── Chargement ────────────────────────────────────────────────
    async function load() {
      const [msgSnap, mbSnap, srvSnap] = await Promise.all([
        getDocs(query(collection(db, 'discord_messages'),     where('serveur_id', '==', GUILD_ID))),
        getDocs(query(collection(db, 'discord_membres_bot'),  where('serveur_id', '==', GUILD_ID))),
        getDocs(collection(db, 'discord_serveurs')),
      ]);
      allMessages = msgSnap.docs.map(d => d.data());
      allMembres  = mbSnap.docs.map(d => d.data());
      allMembres.forEach(m => { memberMap[m.discord_id] = m; });

      const servers = srvSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderNav('graphe', servers);
      buildGraph();
    }

    // ── Algorithme conversations ──────────────────────────────────
    function buildEdges(windowMs) {
      const byChannel = {};
      allMessages.forEach(m => {
        if (!byChannel[m.salon_id]) byChannel[m.salon_id] = [];
        byChannel[m.salon_id].push(m);
      });

      const edges = {};
      for (const msgs of Object.values(byChannel)) {
        const sorted = [...msgs].sort((a, b) => new Date(a.date) - new Date(b.date));
        let convParticipants = new Set();
        let lastTime = null;

        const flushConv = () => {
          const arr = [...convParticipants];
          for (let i = 0; i < arr.length; i++) {
            for (let j = i + 1; j < arr.length; j++) {
              const key = [arr[i], arr[j]].sort().join('|');
              edges[key] = (edges[key] || 0) + 1;
            }
          }
        };

        for (const msg of sorted) {
          const t = new Date(msg.date).getTime();
          if (lastTime !== null && (t - lastTime) > windowMs) {
            flushConv();
            convParticipants = new Set();
          }
          convParticipants.add(msg.auteur_id);
          lastTime = t;
        }
        flushConv();
      }
      return edges;
    }

    // ── Détection clusters (simple Louvain-like greedy) ───────────
    function detectClusters(nodes, links) {
      const cluster = {};
      nodes.forEach(n => { cluster[n.id] = n.id; });

      // Trie les liens par poids desc, assigne cluster du nœud avec le plus de connexions
      const adj = {};
      nodes.forEach(n => { adj[n.id] = {}; });
      links.forEach(l => {
        adj[l.source.id || l.source][l.target.id || l.target] = l.weight;
        adj[l.target.id || l.target][l.source.id || l.source] = l.weight;
      });

      // Itérations : chaque nœud rejoint le cluster le plus représenté parmi ses voisins
      for (let iter = 0; iter < 5; iter++) {
        nodes.forEach(n => {
          const neighbors = adj[n.id] || {};
          const clusterWeight = {};
          for (const [nbId, w] of Object.entries(neighbors)) {
            const c = cluster[nbId];
            clusterWeight[c] = (clusterWeight[c] || 0) + w;
          }
          if (Object.keys(clusterWeight).length === 0) return;
          const best = Object.entries(clusterWeight).sort(([,a],[,b]) => b-a)[0][0];
          cluster[n.id] = best;
        });
      }

      // Renumber clusters 0, 1, 2…
      const ids = [...new Set(Object.values(cluster))];
      const remap = Object.fromEntries(ids.map((id, i) => [id, i]));
      nodes.forEach(n => { n.cluster = remap[cluster[n.id]]; });
    }

    // ── Construction + rendu ──────────────────────────────────────
    function buildGraph() {
      const windowMs = windowMin * 60 * 1000;
      const rawEdges = buildEdges(windowMs);

      const msgCounts = {};
      allMessages.forEach(m => { msgCounts[m.auteur_id] = (msgCounts[m.auteur_id] || 0) + 1; });

      const usedIds = new Set();
      Object.entries(rawEdges).forEach(([key, w]) => {
        if (w >= minEdge) { const [a, b] = key.split('|'); usedIds.add(a); usedIds.add(b); }
      });

      const nodes = [...usedIds].map(id => ({
        id,
        msgs: msgCounts[id] || 0,
        r: Math.max(8, Math.min(28, 6 + Math.sqrt(msgCounts[id] || 1) * 2.5)),
      }));

      const links = Object.entries(rawEdges)
        .filter(([, w]) => w >= minEdge)
        .map(([key, w]) => {
          const [source, target] = key.split('|');
          return { source, target, weight: w };
        });

      document.getElementById('stat-nodes').innerHTML = `<span>${nodes.length}</span> membres`;
      document.getElementById('stat-edges').innerHTML = `<span>${links.length}</span> liens`;

      detectClusters(nodes, links);
      renderD3(nodes, links);
      renderLegend(nodes);
    }

    // ── D3 Force layout ───────────────────────────────────────────
    function renderD3(nodes, links) {
      const wrap  = document.getElementById('graph-wrap');
      const W = wrap.clientWidth;
      const H = wrap.clientHeight;

      d3.select('#graph-svg').selectAll('*').remove();
      const svg = d3.select('#graph-svg')
        .attr('viewBox', `0 0 ${W} ${H}`);

      const g = svg.append('g');

      svg.call(d3.zoom()
        .scaleExtent([0.3, 4])
        .on('zoom', e => g.attr('transform', e.transform)));

      const maxW = Math.max(...links.map(l => l.weight), 1);

      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id)
          .distance(d => Math.max(60, 120 - d.weight * 3))
          .strength(d => Math.min(1, d.weight / maxW * 0.8)))
        .force('charge', d3.forceManyBody().strength(-180))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collision', d3.forceCollide().radius(d => d.r + 6));

      const link = g.append('g').selectAll('line')
        .data(links).join('line')
        .attr('stroke', '#ffffff')
        .attr('stroke-opacity', d => Math.min(0.35, 0.08 + d.weight / maxW * 0.28))
        .attr('stroke-width', d => Math.max(0.5, Math.min(5, d.weight / maxW * 5)));

      const nodeG = g.append('g').selectAll('g')
        .data(nodes).join('g')
        .style('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

      nodeG.append('circle')
        .attr('r', d => d.r)
        .attr('fill', d => CLUSTER_COLORS[d.cluster % CLUSTER_COLORS.length])
        .attr('fill-opacity', 0.85)
        .attr('stroke', '#1e1f22')
        .attr('stroke-width', 2);

      nodeG.append('text')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .attr('font-size', d => Math.max(7, Math.min(11, d.r * 0.6)))
        .attr('fill', '#fff')
        .attr('pointer-events', 'none')
        .text(d => {
          const m = memberMap[d.id];
          const nom = m?.display_name || m?.nom || d.id.slice(0, 4);
          return d.r > 12 ? nom.slice(0, 8) : nom.slice(0, 3);
        });

      // Tooltip
      nodeG
        .on('mouseenter', (e, d) => {
          const m   = memberMap[d.id];
          const nom = m?.display_name || m?.nom || d.id;
          const connCount = links.filter(l => (l.source.id||l.source) === d.id || (l.target.id||l.target) === d.id).length;
          document.getElementById('tt-name').textContent  = nom;
          document.getElementById('tt-msgs').textContent  = `${d.msgs} messages`;
          document.getElementById('tt-links').textContent = `${connCount} connexions`;
          const tt = document.getElementById('tooltip');
          tt.style.left = (e.offsetX + 14) + 'px';
          tt.style.top  = (e.offsetY - 10) + 'px';
          tt.classList.add('visible');
        })
        .on('mousemove', e => {
          const tt = document.getElementById('tooltip');
          tt.style.left = (e.offsetX + 14) + 'px';
          tt.style.top  = (e.offsetY - 10) + 'px';
        })
        .on('mouseleave', () => document.getElementById('tooltip').classList.remove('visible'))
        .on('click', (e, d) => { e.stopPropagation(); openPanel(d, links); });

      svg.on('click', () => document.getElementById('member-panel').classList.remove('open'));

      sim.on('tick', () => {
        link
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    // ── Légende clusters ──────────────────────────────────────────
    function renderLegend(nodes) {
      const clusters = [...new Set(nodes.map(n => n.cluster))].sort();
      if (clusters.length <= 1) return;
      const legend = document.getElementById('legend');
      legend.classList.add('visible');
      document.getElementById('legend-items').innerHTML = clusters.map(c => {
        const name = clusterNames[c] || `Groupe ${c + 1}`;
        return `
          <div class="legend-item">
            <div class="legend-dot" style="background:${CLUSTER_COLORS[c % CLUSTER_COLORS.length]}"></div>
            <span class="legend-name" data-cluster="${c}" title="Double-clic pour renommer">${esc(name)}</span>
          </div>`;
      }).join('');

      document.querySelectorAll('.legend-name').forEach(el => {
        el.addEventListener('dblclick', () => {
          const c = +el.dataset.cluster;
          const input = document.createElement('input');
          input.className = 'legend-name editing';
          input.value = clusterNames[c] || `Groupe ${c + 1}`;
          el.replaceWith(input);
          input.focus();
          const save = () => {
            clusterNames[c] = input.value.trim() || `Groupe ${c + 1}`;
            input.replaceWith(Object.assign(document.createElement('span'), {
              className: 'legend-name', dataset: { cluster: c },
              textContent: clusterNames[c], title: 'Double-clic pour renommer',
            }));
          };
          input.addEventListener('blur', save);
          input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
        });
      });
    }

    // ── Panneau membre ────────────────────────────────────────────
    function openPanel(node, links) {
      const m   = memberMap[node.id];
      const nom = m?.display_name || m?.nom || node.id;
      const ini = nom.slice(0, 2).toUpperCase();
      const av  = m?.avatar_url ? `<img src="${esc(m.avatar_url)}" alt="">` : ini;

      document.getElementById('panel-avatar').innerHTML = av;
      document.getElementById('panel-name').textContent = nom;
      document.getElementById('panel-sub').textContent  = `${node.msgs} messages`;

      const conns = links
        .filter(l => (l.source.id||l.source) === node.id || (l.target.id||l.target) === node.id)
        .map(l => {
          const otherId = (l.source.id||l.source) === node.id ? (l.target.id||l.target) : (l.source.id||l.source);
          return { id: otherId, weight: l.weight };
        })
        .sort((a, b) => b.weight - a.weight);

      const maxW = conns[0]?.weight || 1;
      document.getElementById('panel-body').innerHTML = conns.length ? `
        <div>
          <div class="panel-section-title">Connexions (${conns.length})</div>
          ${conns.map(c => {
            const mb2  = memberMap[c.id];
            const nom2 = mb2?.display_name || mb2?.nom || c.id.slice(0,8);
            const ini2 = nom2.slice(0,2).toUpperCase();
            const av2  = mb2?.avatar_url ? `<img src="${esc(mb2.avatar_url)}" alt="">` : ini2;
            return `
              <div class="conn-row">
                <div class="conn-av">${av2}</div>
                <div class="conn-name">${esc(nom2)}</div>
                <div class="conn-bar-bg"><div class="conn-bar-fill" style="width:${Math.round(c.weight/maxW*100)}%"></div></div>
                <div class="conn-count">${c.weight}</div>
              </div>`;
          }).join('')}
        </div>` : '<div class="empty-msg">Aucune connexion avec ce seuil.</div>';

      document.getElementById('member-panel').classList.add('open');
    }

    document.getElementById('btn-close-panel').onclick = () =>
      document.getElementById('member-panel').classList.remove('open');

    // ── Sliders ───────────────────────────────────────────────────
    let rebuildTimer;
    const debuild = () => { clearTimeout(rebuildTimer); rebuildTimer = setTimeout(buildGraph, 300); };

    document.getElementById('slider-window').addEventListener('input', e => {
      windowMin = +e.target.value;
      document.getElementById('slider-label').textContent = `${windowMin} min`;
      debuild();
    });
    document.getElementById('slider-min').addEventListener('input', e => {
      minEdge = +e.target.value;
      document.getElementById('slider-min-label').textContent = `${minEdge} conv.`;
      debuild();
    });

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    load();
  </script>
</body>
</html>
