<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Discord — Membres</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #313338; --sidebar-bg: #2b2d31; --surface: #383a40; --surface2: #404249;
      --border: #1e1f22; --text: #dbdee1; --muted: #80848e; --accent: #5865f2;
      --sidebar-w: 220px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; display: flex; min-height: 100vh; }
    #sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 1.25rem .75rem; overflow-y: auto; }
    .sidebar-header { display: flex; align-items: center; gap: .6rem; padding: .5rem .5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: .75rem; }
    .sidebar-logo { font-size: 1.4rem; } .sidebar-title { font-weight: 700; font-size: .95rem; color: #fff; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .sidebar-section { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: .75rem .75rem .25rem; }
    .sidebar-link { display: flex; align-items: center; gap: .55rem; padding: .55rem .75rem; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: .88rem; font-weight: 500; transition: background .15s, color .15s; }
    .sidebar-link:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .sidebar-link.active { background: rgba(88,101,242,.2); color: #c7caf9; }
    .sidebar-link.server-active { color: var(--text); }
    .sidebar-sublink { padding-left: 2rem; font-size: .82rem; }
    .sidebar-footer { padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
    .sidebar-home { display: block; text-decoration: none; color: var(--muted); font-size: .8rem; padding: .4rem .5rem; border-radius: 5px; transition: color .15s; }
    .sidebar-home:hover { color: var(--text); }

    .layout { margin-left: var(--sidebar-w); flex: 1; display: flex; min-height: 100vh; }
    .main { flex: 1; padding: 2rem 2.5rem; min-width: 0; transition: margin-right .25s; }
    .main.panel-open { margin-right: 640px; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem; }
    .page-title { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .sort-group { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .sort-label { font-size: .75rem; color: var(--muted); margin-right: .1rem; }
    .sort-btn { padding: .28rem .65rem; font-size: .75rem; font-weight: 600; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all .15s; }
    .sort-btn:hover { color: var(--text); border-color: rgba(88,101,242,.4); }
    .sort-btn.active { background: rgba(88,101,242,.2); border-color: rgba(88,101,242,.5); color: #c7caf9; }

    .member-list { display: flex; flex-direction: column; gap: .5rem; }
    .member-row { display: flex; align-items: center; gap: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1.1rem; cursor: pointer; transition: border-color .15s, background .15s; }
    .member-row:hover { border-color: rgba(88,101,242,.4); background: var(--surface2); }
    .member-row.selected { border-color: rgba(88,101,242,.55); background: rgba(88,101,242,.07); }
    .rank { font-size: .78rem; font-weight: 700; color: var(--muted); min-width: 28px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: .9rem; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-weight: 600; color: #fff; font-size: .95rem; }
    .member-sub { font-size: .74rem; color: var(--muted); margin-top: .15rem; }
    .member-stats { display: flex; gap: 1.25rem; align-items: center; flex-shrink: 0; }
    .stat-val .n { font-size: 1.15rem; font-weight: 700; color: #fff; text-align: right; }
    .stat-val .l { font-size: .67rem; color: var(--muted); text-align: right; }
    .bar-bg { width: 110px; height: 5px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: var(--accent); }
    .chevron { color: var(--muted); font-size: .9rem; }

    /* ── Panneau détail ── */
    #detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 640px; background: var(--sidebar-bg); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform .25s ease; display: flex; flex-direction: column; z-index: 20; overflow-y: auto; }
    #detail-panel.open { transform: translateX(0); }
    .panel-header { display: flex; align-items: center; gap: .9rem; padding: 1.4rem 1.5rem 1.1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--sidebar-bg); z-index: 1; }
    .panel-avatar { width: 54px; height: 54px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 1.1rem; flex-shrink: 0; overflow: hidden; }
    .panel-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .panel-name { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .panel-sub { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
    .btn-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.5rem; line-height: 1; padding: .2rem; flex-shrink: 0; transition: color .15s; }
    .btn-close:hover { color: var(--text); }
    .panel-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .panel-section-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .85rem; }

    .mini-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; }
    .mini-kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .75rem .9rem; }
    .mini-kpi .n { font-size: 1.55rem; font-weight: 700; color: #fff; line-height: 1; }
    .mini-kpi .l { font-size: .7rem; color: var(--muted); margin-top: .2rem; }

    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem 1.5rem; }
    .chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 130px; overflow-x: auto; overflow-y: hidden; padding-bottom: 20px; }
    .chart-bars::-webkit-scrollbar { height: 5px; }
    .chart-bars::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
    .bar-wrap-c { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex-shrink: 0; position: relative; height: 100%; }
    .bar-col-c { background: var(--accent); border-radius: 3px 3px 0 0; opacity: .7; width: 100%; transition: opacity .15s; }
    .bar-col-c:hover { opacity: 1; }
    .bar-lbl { font-size: .65rem; color: var(--muted); white-space: nowrap; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); }

    .salon-bars { display: flex; flex-direction: column; gap: .45rem; }
    .salon-row { display: flex; align-items: center; gap: .75rem; }
    .salon-name { font-size: .83rem; color: var(--text); min-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .salon-bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .salon-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); }
    .salon-count { font-size: .78rem; color: var(--muted); min-width: 36px; text-align: right; }

    .types-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: .5rem; }
    .type-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .65rem .85rem; }
    .type-icon { font-size: 1rem; margin-bottom: .2rem; }
    .type-count { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .type-label { font-size: .68rem; color: var(--muted); }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="layout">
    <main class="main" id="main">
      <div class="page-header">
        <div class="page-title">👥 Membres</div>
        <div class="sort-group">
          <span class="sort-label">Trier par :</span>
          <button class="sort-btn active" data-sort="msgs">Nb messages</button>
          <button class="sort-btn" data-sort="recent">Msg récent</button>
          <button class="sort-btn" data-sort="ancien-msg">Msg ancien</button>
          <button class="sort-btn" data-sort="anciennete">Ancienneté</button>
        </div>
      </div>
      <div class="member-list" id="member-list"></div>
    </main>
    <div id="detail-panel">
      <div class="panel-header">
        <div class="panel-avatar" id="p-avatar"></div>
        <div><div class="panel-name" id="p-name"></div><div class="panel-sub" id="p-sub"></div></div>
        <button class="btn-close" id="btn-close">×</button>
      </div>
      <div class="panel-body" id="p-body"></div>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { renderNav } from './nav.js';
    import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const params   = new URLSearchParams(location.search);
    const GUILD_ID = params.get('id') || '1499528679758364744';
    let allMessages = [], allMembres = [], memberMap = {};
    let sortKey = 'msgs', openId = null;

    async function load() {
      const [msgSnap, mbSnap, srvSnap] = await Promise.all([
        getDocs(query(collection(db,'discord_messages'),    where('serveur_id','==',GUILD_ID))),
        getDocs(query(collection(db,'discord_membres_bot'), where('serveur_id','==',GUILD_ID))),
        getDocs(collection(db,'discord_serveurs')),
      ]);
      allMessages = msgSnap.docs.map(d=>d.data());
      allMembres  = mbSnap.docs.map(d=>d.data());
      allMembres.forEach(m=>{ memberMap[m.discord_id]=m; });
      renderNav('membres', srvSnap.docs.map(d=>({id:d.id,...d.data()})));
      renderList();
    }

    function buildMemberData() {
      const msgCount={}, firstMsg={}, lastMsg={};
      allMessages.forEach(m => {
        const id = m.auteur_id;
        msgCount[id] = (msgCount[id]||0)+1;
        if (!firstMsg[id]||m.date<firstMsg[id]) firstMsg[id]=m.date;
        if (!lastMsg[id] ||m.date>lastMsg[id])  lastMsg[id] =m.date;
      });
      return allMembres.map(m => ({
        ...m,
        msgs:     msgCount[m.discord_id]||0,
        firstMsg: firstMsg[m.discord_id]||null,
        lastMsg:  lastMsg[m.discord_id]||null,
      }));
    }

    function renderList() {
      const data   = buildMemberData();
      const sorted = [...data].sort((a,b)=>{
        if (sortKey==='msgs')       return b.msgs-a.msgs;
        if (sortKey==='recent')     return (b.lastMsg||'').localeCompare(a.lastMsg||'');
        if (sortKey==='ancien-msg') return (a.firstMsg||'zzz').localeCompare(b.firstMsg||'zzz');
        if (sortKey==='anciennete') return (a.date_arrivee||'zzz').localeCompare(b.date_arrivee||'zzz');
        return 0;
      });
      const maxM = Math.max(...sorted.map(s=>s.msgs),1);
      const now  = Date.now();

      document.getElementById('member-list').innerHTML = sorted.map((m,i)=>{
        const ini  = (m.display_name||m.nom||'?').slice(0,2).toUpperCase();
        const av   = m.avatar_url ? `<img src="${esc(m.avatar_url)}" alt="">` : ini;
        const days = m.date_arrivee ? Math.floor((now-new Date(m.date_arrivee))/86400000) : null;
        const sub  = [
          m.date_arrivee ? `Depuis ${m.date_arrivee.slice(0,10)}${days!==null?` · ${days} j`:''}` : null,
          m.lastMsg ? `Dernier msg ${m.lastMsg.slice(0,10)}` : null,
        ].filter(Boolean).join('  ·  ');
        return `<div class="member-row${openId===m.discord_id?' selected':''}" onclick="openMember('${m.discord_id}')">
          <div class="rank">#${i+1}</div>
          <div class="avatar">${av}</div>
          <div class="member-info">
            <div class="member-name">${esc(m.display_name||m.nom||'—')}</div>
            <div class="member-sub">${sub}</div>
          </div>
          <div class="member-stats">
            <div class="stat-val"><div class="n">${m.msgs}</div><div class="l">messages</div></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(m.msgs/maxM*100)}%"></div></div>
          </div>
          <div class="chevron">›</div>
        </div>`;
      }).join('');
    }

    let panelMsgs = [], panelGran = 'month';

    function getKey(dateStr, gran) {
      if (!dateStr) return null;
      if (gran==='year')  return dateStr.slice(0,4);
      if (gran==='month') return dateStr.slice(0,7);
      const d=new Date(dateStr), jan4=new Date(d.getFullYear(),0,4);
      const w=Math.ceil(((d-jan4)/86400000+jan4.getDay()+1)/7);
      return `${d.getFullYear()}-W${String(w).padStart(2,'0')}`;
    }

    function renderPanelChart() {
      const counts={};
      panelMsgs.forEach(m=>{ const k=getKey(m.date,panelGran); if(k) counts[k]=(counts[k]||0)+1; });
      const sorted = Object.entries(counts).sort(([a],[b])=>a.localeCompare(b));
      const max  = Math.max(...sorted.map(([,v])=>v),1);
      const barH = 108;
      const barW = panelGran==='year'?36:panelGran==='month'?22:14;
      const step = Math.max(1, Math.ceil(48/barW));
      const bars = sorted.map(([k,v],i)=>{
        const showL = i%step===0||i===sorted.length-1;
        return `<div class="bar-wrap-c" style="width:${barW}px">
          <div class="bar-col-c" style="height:${Math.max(2,Math.round(v/max*barH))}px" title="${k}:${v}"></div>
          ${showL?`<div class="bar-lbl">${shortLabel(k)}</div>`:''}
        </div>`;
      }).join('');
      const el = document.getElementById('panel-chart-bars');
      if (el) el.innerHTML = bars || '<span style="color:var(--muted);font-size:.8rem;padding:.5rem">Aucune donnée</span>';
      document.querySelectorAll('.chart-toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.g===panelGran));
    }

    window.openMember = (id) => {
      openId = id; panelGran = 'month';
      renderList();
      const m   = memberMap[id];
      const nom = m?.display_name||m?.nom||id;
      panelMsgs = allMessages.filter(x=>x.auteur_id===id);
      const days = m?.date_arrivee ? Math.floor((Date.now()-new Date(m.date_arrivee))/86400000) : null;

      document.getElementById('p-avatar').innerHTML = m?.avatar_url ? `<img src="${esc(m.avatar_url)}" alt="">` : nom.slice(0,2).toUpperCase();
      document.getElementById('p-name').textContent = nom;
      document.getElementById('p-sub').textContent  = `${panelMsgs.length} messages${days!==null?' · '+days+' jours sur le serveur':''}`;

      const bySalon={};
      panelMsgs.forEach(x=>{ bySalon[x.salon_nom]=(bySalon[x.salon_nom]||0)+1; });
      const topSalons = Object.entries(bySalon).sort(([,a],[,b])=>b-a);
      const maxS = topSalons[0]?.[1]||1;

      const byType={};
      panelMsgs.forEach(x=>{ byType[x.type]=(byType[x.type]||0)+1; });
      const icons={texte:'💬',image:'🖼️',lien:'🔗',video:'🎥',fichier:'📎',sondage:'🗳️',autre:'❓'};

      document.getElementById('p-body').innerHTML = `
        <div>
          <div class="mini-kpis">
            <div class="mini-kpi"><div class="n">${panelMsgs.length}</div><div class="l">Messages</div></div>
            <div class="mini-kpi"><div class="n">${panelMsgs.filter(x=>x.est_reponse).length}</div><div class="l">Réponses</div></div>
            <div class="mini-kpi"><div class="n">${panelMsgs.filter(x=>x.type==='image').length}</div><div class="l">Images</div></div>
            <div class="mini-kpi"><div class="n">${panelMsgs.filter(x=>x.type==='sondage').length}</div><div class="l">Sondages</div></div>
          </div>
        </div>
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
            <div class="panel-section-title" style="margin-bottom:0">Activité</div>
            <div style="display:flex;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border)">
              <button class="chart-toggle-btn" data-g="week"  style="padding:.22rem .55rem;font-size:.72rem;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);transition:all .15s">Semaine</button>
              <button class="chart-toggle-btn active" data-g="month" style="padding:.22rem .55rem;font-size:.72rem;font-weight:600;background:var(--accent);border:none;cursor:pointer;color:#fff;transition:all .15s">Mois</button>
              <button class="chart-toggle-btn" data-g="year"  style="padding:.22rem .55rem;font-size:.72rem;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);transition:all .15s">Année</button>
            </div>
          </div>
          <div class="chart-wrap"><div class="chart-bars" id="panel-chart-bars"></div></div>
        </div>
        <div>
          <div class="panel-section-title">Par salon</div>
          <div class="salon-bars">${topSalons.map(([n2,c])=>`
            <div class="salon-row">
              <div class="salon-name">#${esc(n2)}</div>
              <div class="salon-bar-bg"><div class="salon-bar-fill" style="width:${Math.round(c/maxS*100)}%"></div></div>
              <div class="salon-count">${c}</div>
            </div>`).join('')}</div>
        </div>
        <div>
          <div class="panel-section-title">Types de contenu</div>
          <div class="types-grid">${Object.entries(byType).sort(([,a],[,b])=>b-a).map(([t,n2])=>`
            <div class="type-card"><div class="type-icon">${icons[t]||'❓'}</div><div class="type-count">${n2}</div><div class="type-label">${t[0].toUpperCase()+t.slice(1)}</div></div>`).join('')}
          </div>
        </div>`;

      renderPanelChart();

      document.querySelectorAll('.chart-toggle-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{ panelGran=btn.dataset.g; renderPanelChart(); });
      });

      document.getElementById('detail-panel').classList.add('open');
      document.getElementById('main').classList.add('panel-open');
    };

    document.getElementById('btn-close').onclick = () => {
      openId=null;
      document.getElementById('detail-panel').classList.remove('open');
      document.getElementById('main').classList.remove('panel-open');
      renderList();
    };

    document.querySelectorAll('.sort-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        sortKey=btn.dataset.sort;
        document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b===btn));
        renderList();
      });
    });

    function shortLabel(k) {
      if (k.length===4) return k;
      const [y,m2]=k.split('-');
      return ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'][+m2-1]+` '${y.slice(2)}`;
    }
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    load();
  </script>
</body>
</html>
