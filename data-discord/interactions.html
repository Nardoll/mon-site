<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Discord — Interactions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #313338; --sidebar-bg: #2b2d31; --surface: #383a40; --surface2: #404249;
      --border: #1e1f22; --text: #dbdee1; --muted: #80848e; --accent: #5865f2;
      --green: #57f287; --yellow: #fee75c; --red: #ed4245;
      --sidebar-w: 220px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    #sidebar { width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 1.25rem .75rem; overflow-y: auto; }
    .sidebar-header { display: flex; align-items: center; gap: .6rem; padding: .5rem .5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: .75rem; }
    .sidebar-logo { font-size: 1.4rem; }
    .sidebar-title { font-weight: 700; font-size: .95rem; color: #fff; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .sidebar-section { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: .75rem .75rem .25rem; }
    .sidebar-link { display: flex; align-items: center; gap: .55rem; padding: .55rem .75rem; border-radius: 6px; text-decoration: none; color: var(--muted); font-size: .88rem; font-weight: 500; transition: background .15s, color .15s; }
    .sidebar-link:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .sidebar-link.active { background: rgba(88,101,242,.2); color: #c7caf9; }
    .sidebar-link.server-active { color: var(--text); }
    .sidebar-sublink { font-size: .82rem; padding: .4rem .65rem; }
    .sidebar-footer { padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
    .sidebar-home { display: block; text-decoration: none; color: var(--muted); font-size: .8rem; padding: .4rem .5rem; border-radius: 5px; transition: color .15s; }
    .sidebar-home:hover { color: var(--text); }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 2rem 2.5rem; }

    /* ── Page header ── */
    .page-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.75rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .page-title { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .page-sub { font-size: .82rem; color: var(--muted); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 1.75rem; width: fit-content; }
    .tab-btn { padding: .42rem 1.1rem; border-radius: 6px; font-size: .85rem; font-weight: 600; color: var(--muted); background: none; border: none; cursor: pointer; transition: background .15s, color .15s; }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .tab-btn:hover:not(.active) { background: rgba(255,255,255,.06); color: var(--text); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .ctrl-group { display: flex; align-items: center; gap: .6rem; }
    .ctrl-label { font-size: .78rem; color: var(--muted); font-weight: 600; white-space: nowrap; }
    input[type=range] { accent-color: var(--accent); cursor: pointer; width: 130px; }
    .ctrl-val { font-size: .83rem; color: var(--text); font-weight: 700; min-width: 52px; }

    /* toggle vue */
    .toggle-group { display: flex; background: var(--surface2); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .toggle-btn { padding: .28rem .7rem; font-size: .75rem; font-weight: 600; color: var(--muted); background: none; border: none; cursor: pointer; transition: background .15s, color .15s; }
    .toggle-btn.active { background: var(--accent); color: #fff; }

    /* ── Section title ── */
    .section-block { margin-bottom: 1.75rem; }
    .section-title { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem; display: flex; align-items: center; gap: .75rem; }

    /* ── Top paires ── */
    .pairs-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; }
    .pairs-grid { display: grid; grid-template-columns: max-content 1fr auto; gap: .42rem .75rem; align-items: center; }
    .pair-names { font-size: .85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .pair-bar-bg { height: 5px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; min-width: 0; }
    .pair-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); opacity: .75; }
    .pair-count { font-size: .82rem; font-weight: 700; color: var(--text); text-align: right; white-space: nowrap; }

    /* ── Conversations groupées ── */
    .convos-list { display: flex; flex-direction: column; gap: .55rem; }
    .convo-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
      padding: .8rem 1rem; display: flex; align-items: flex-start; gap: 1rem;
    }
    .convo-rank { font-size: .75rem; font-weight: 700; color: var(--muted); min-width: 24px; padding-top: .1rem; }
    .convo-body { flex: 1; min-width: 0; }
    .convo-participants { font-size: .87rem; color: var(--text); font-weight: 600; margin-bottom: .25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .convo-meta { font-size: .75rem; color: var(--muted); display: flex; gap: .9rem; flex-wrap: wrap; }
    .convo-meta span { display: flex; align-items: center; gap: .3rem; }
    .convo-stats { display: flex; flex-direction: column; align-items: flex-end; gap: .2rem; flex-shrink: 0; }
    .stat-big { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .stat-lbl { font-size: .68rem; color: var(--muted); text-align: right; }

    /* ── Matrice ── */
    .matrix-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; overflow-x: auto; }
    .matrix-table { border-collapse: collapse; font-size: .75rem; white-space: nowrap; }
    .matrix-table th { padding: .3rem .5rem; color: var(--muted); font-weight: 600; }
    .matrix-table th.row-head { text-align: right; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; padding-right: .75rem; }
    .matrix-table th.col-head { writing-mode: vertical-rl; transform: rotate(180deg); max-height: 100px; overflow: hidden; text-overflow: ellipsis; padding: .5rem .3rem; color: var(--text); }
    .matrix-table td { padding: .3rem .4rem; text-align: center; min-width: 34px; border-radius: 3px; cursor: default; font-size: .75rem; }
    .matrix-table td.self { background: rgba(255,255,255,.03); color: var(--muted); }

    /* ── Tooltip ── */
    #tip {
      position: fixed; pointer-events: none; z-index: 50; display: none;
      background: #1e1f22; border: 1px solid rgba(255,255,255,.12); border-radius: 8px;
      padding: .5rem .75rem; flex-direction: column; gap: .1rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    #tip.visible { display: flex; }
    .tt-label { font-size: .78rem; color: var(--muted); }
    .tt-val   { font-size: .95rem; font-weight: 700; color: #fff; }

    .empty { color: var(--muted); font-size: .85rem; font-style: italic; padding: 1rem 0; }

    @media (max-width: 640px) { #sidebar { display: none; } .main { margin-left: 0; padding: 1.25rem; } }
  </style>
</head>
<body>
  <div id="sidebar"></div>

  <main class="main">
    <div class="page-header">
      <div class="page-title">🤝 Interactions</div>
      <div class="page-sub" id="page-sub">Chargement…</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="convos">💬 Conversations</button>
      <button class="tab-btn" data-tab="reponses">↩️ Réponses directes</button>
    </div>

    <!-- ── Conversations ── -->
    <div class="tab-pane active" id="tab-convos">
      <div class="toolbar">
        <div class="ctrl-group">
          <div class="ctrl-label">Fenêtre</div>
          <input type="range" id="window-slider" min="5" max="120" step="5" value="30">
          <div class="ctrl-val"><span id="window-val">30</span> min</div>
        </div>
        <div class="ctrl-group">
          <div class="ctrl-label">Vue</div>
          <div class="toggle-group">
            <button class="toggle-btn active" data-view="pairs">Paires</button>
            <button class="toggle-btn" data-view="groups">Conversations</button>
          </div>
        </div>
        <div class="ctrl-group" id="sort-ctrl" style="display:none">
          <div class="ctrl-label">Trier par</div>
          <div class="toggle-group">
            <button class="toggle-btn active" data-sort="msgs">Messages</button>
            <button class="toggle-btn" data-sort="parts">Participants</button>
          </div>
        </div>
      </div>

      <!-- Vue paires -->
      <div id="view-pairs">
        <div class="section-block">
          <div class="section-title">Top interactions à 2</div>
          <div class="pairs-wrap"><div class="pairs-grid" id="convo-pairs"></div></div>
        </div>
        <div class="section-block">
          <div class="section-title">Matrice des interactions</div>
          <div class="matrix-wrap" id="convo-matrix"></div>
        </div>
      </div>

      <!-- Vue conversations groupées -->
      <div id="view-groups" style="display:none">
        <div class="section-block">
          <div class="section-title">Conversations détectées <span id="convo-count" style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
          <div class="convos-list" id="convos-list"></div>
        </div>
      </div>
    </div>

    <!-- ── Réponses ── -->
    <div class="tab-pane" id="tab-reponses">
      <div class="section-block">
        <div class="section-title">Qui répond le plus</div>
        <div class="pairs-wrap"><div class="pairs-grid" id="reply-pairs"></div></div>
      </div>
      <div class="section-block">
        <div id="reply-matrix-info" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;font-size:.82rem;color:var(--muted)"></div>
      </div>
    </div>
  </main>

  <div id="tip">
    <div class="tt-label" id="tt-label"></div>
    <div class="tt-val"   id="tt-val"></div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { renderNav } from './nav.js';
    import { collection, getDocs, query, where, doc, getDoc }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const params   = new URLSearchParams(location.search);
    const GUILD_ID = params.get('id') || '1499528679758364744';

    let allMessages = [];
    let allMembres  = [];
    let windowMin   = 30;
    let convoView   = 'pairs';   // 'pairs' | 'groups'
    let convoSort   = 'msgs';    // 'msgs' | 'parts'

    // ── Chargement ────────────────────────────────────────────────
    async function load() {
      const [msgSnap, mbSnap, srvSnap, srvDoc] = await Promise.all([
        getDocs(query(collection(db, 'discord_messages'),     where('serveur_id', '==', GUILD_ID))),
        getDocs(query(collection(db, 'discord_membres_bot'), where('serveur_id', '==', GUILD_ID))),
        getDocs(query(collection(db, 'discord_serveurs'))),
        getDoc(doc(db, 'discord_serveurs', GUILD_ID))
      ]);

      allMessages = msgSnap.docs.map(d => d.data());
      allMembres  = mbSnap.docs.map(d => d.data());

      const srv = srvDoc.exists() ? srvDoc.data() : {};
      renderNav(GUILD_ID, srvSnap.docs.map(d => ({ id: d.id, ...d.data() })));

      document.getElementById('page-sub').textContent =
        `${srv.nom || 'Serveur'} · ${allMessages.length} messages`;

      renderConvos();
      renderReponses();
    }

    // ── Helpers ───────────────────────────────────────────────────
    function memberName(id) {
      const mb = allMembres.find(m => m.discord_id === id);
      return mb?.display_name || mb?.nom || id.slice(0, 8);
    }
    function pairKey(a, b) { return a < b ? `${a}|${b}` : `${b}|${a}`; }

    // ── Détection des conversations ───────────────────────────────
    // Retourne :
    //   pairCounts   : { 'id1|id2': N }  — nb conversations partagées entre chaque paire
    //   conversations: [{ participants: [id…], msgCount, start, end, salon }]
    function detectConversations(windowMs) {
      const bySalon = {};
      allMessages.forEach(m => {
        if (!bySalon[m.salon_id]) bySalon[m.salon_id] = { nom: m.salon_nom, msgs: [] };
        bySalon[m.salon_id].msgs.push(m);
      });

      const pairCounts   = {};
      const conversations = [];

      for (const { nom: salonNom, msgs } of Object.values(bySalon)) {
        msgs.sort((a, b) => new Date(a.date) - new Date(b.date));

        let convo = { participants: new Set(), msgs: [], start: null, end: null };

        const flushConvo = () => {
          if (convo.participants.size < 1) { convo = { participants: new Set(), msgs: [], start: null, end: null }; return; }
          const parts = [...convo.participants];
          // Paires
          for (let i = 0; i < parts.length; i++)
            for (let j = i + 1; j < parts.length; j++) {
              const k = pairKey(parts[i], parts[j]);
              pairCounts[k] = (pairCounts[k] || 0) + 1;
            }
          // Conversation complète (ne garder que celles avec ≥2 participants)
          if (parts.length >= 2) {
            conversations.push({
              participants: parts,
              msgCount: convo.msgs.length,
              start: convo.start,
              end:   convo.end,
              salon: salonNom,
            });
          }
          convo = { participants: new Set(), msgs: [], start: null, end: null };
        };

        for (const m of msgs) {
          const t = new Date(m.date).getTime();
          if (convo.start !== null && t - new Date(convo.end).getTime() > windowMs) {
            flushConvo();
          }
          convo.participants.add(m.auteur_id);
          convo.msgs.push(m);
          if (!convo.start) convo.start = m.date;
          convo.end = m.date;
        }
        flushConvo();
      }

      return { pairCounts, conversations };
    }

    // ── Rendu Conversations ───────────────────────────────────────
    function renderConvos() {
      const { pairCounts, conversations } = detectConversations(windowMin * 60000);

      // Vue paires
      const sortedPairs = Object.entries(pairCounts).sort(([,a],[,b]) => b - a);
      renderPairsGrid('convo-pairs', sortedPairs);
      renderMatrix('convo-matrix', sortedPairs);

      // Vue conversations groupées
      const sortedConvos = [...conversations].sort((a, b) =>
        convoSort === 'msgs'
          ? b.msgCount - a.msgCount
          : b.participants.length - a.participants.length
      );

      document.getElementById('convo-count').textContent =
        `— ${sortedConvos.length} au total`;

      const listEl = document.getElementById('convos-list');
      if (!sortedConvos.length) {
        listEl.innerHTML = '<div class="empty">Aucune conversation détectée</div>';
        return;
      }

      listEl.innerHTML = sortedConvos.slice(0, 30).map((c, i) => {
        const names = c.participants.map(id => memberName(id)).join(', ');
        const duration = c.start && c.end
          ? Math.round((new Date(c.end) - new Date(c.start)) / 60000)
          : 0;
        const dateStr = c.start ? c.start.slice(0, 10) : '—';
        return `
          <div class="convo-card">
            <div class="convo-rank">#${i+1}</div>
            <div class="convo-body">
              <div class="convo-participants" title="${esc(names)}">${esc(names)}</div>
              <div class="convo-meta">
                <span>💬 #${esc(c.salon || '—')}</span>
                <span>📅 ${dateStr}</span>
                ${duration > 0 ? `<span>⏱ ${duration} min</span>` : ''}
              </div>
            </div>
            <div class="convo-stats">
              <div class="stat-big">${c.msgCount}</div>
              <div class="stat-lbl">messages</div>
              <div class="stat-big" style="font-size:.9rem;margin-top:.2rem">${c.participants.length}</div>
              <div class="stat-lbl">participant${c.participants.length > 1 ? 's' : ''}</div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Rendu paires (grille 3 colonnes) ─────────────────────────
    function renderPairsGrid(elId, sorted) {
      const el  = document.getElementById(elId);
      const top = sorted.slice(0, 20);
      const max = top[0]?.[1] || 1;
      if (!top.length) { el.innerHTML = '<div class="empty">Aucune donnée</div>'; return; }
      el.innerHTML = top.map(([key, n]) => {
        const [a, b] = key.split('|');
        const label  = `${esc(memberName(a))} & ${esc(memberName(b))}`;
        return `
          <div class="pair-names" title="${label}">${label}</div>
          <div class="pair-bar-bg"><div class="pair-bar-fill" style="width:${Math.round(n/max*100)}%"></div></div>
          <div class="pair-count">${n}</div>`;
      }).join('');
    }

    // ── Matrice heatmap ───────────────────────────────────────────
    function renderMatrix(elId, sorted) {
      const el = document.getElementById(elId);
      if (!sorted.length) { el.innerHTML = '<div class="empty">Aucune donnée</div>'; return; }

      const totals = {};
      sorted.forEach(([key, n]) => {
        const [a, b] = key.split('|');
        totals[a] = (totals[a] || 0) + n;
        totals[b] = (totals[b] || 0) + n;
      });
      const members = Object.entries(totals).sort(([,a],[,b]) => b-a).slice(0, 16).map(([id]) => id);
      const pairMap = {};
      sorted.forEach(([key, n]) => { pairMap[key] = n; });
      const max = sorted[0]?.[1] || 1;

      const heat = n => {
        if (!n) return 'rgba(255,255,255,.03)';
        const t = n / max;
        return `rgba(88,101,242,${(0.1 + t * 0.7).toFixed(2)})`;
      };

      let html = `<table class="matrix-table"><thead><tr><th></th>`;
      members.forEach(id => {
        html += `<th class="col-head" title="${esc(memberName(id))}">${esc(memberName(id))}</th>`;
      });
      html += '</tr></thead><tbody>';
      members.forEach(rowId => {
        html += `<tr><th class="row-head" title="${esc(memberName(rowId))}">${esc(memberName(rowId))}</th>`;
        members.forEach(colId => {
          if (rowId === colId) {
            html += `<td class="self">—</td>`;
          } else {
            const n = pairMap[pairKey(rowId, colId)] || 0;
            html += `<td style="background:${heat(n)}"
              data-a="${esc(memberName(rowId))}" data-b="${esc(memberName(colId))}" data-n="${n}"
              >${n || ''}</td>`;
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      el.innerHTML = html;

      const tip = document.getElementById('tip');
      el.addEventListener('mouseover', e => {
        const td = e.target.closest('td[data-n]');
        if (!td) return;
        document.getElementById('tt-label').textContent = `${td.dataset.a} & ${td.dataset.b}`;
        document.getElementById('tt-val').textContent   = `${td.dataset.n} conversation${+td.dataset.n > 1 ? 's' : ''}`;
        tip.classList.add('visible');
      });
      el.addEventListener('mousemove', e => {
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top  = (e.clientY - 52) + 'px';
      });
      el.addEventListener('mouseleave', () => tip.classList.remove('visible'));
    }

    // ── Réponses directes ─────────────────────────────────────────
    function renderReponses() {
      const replierCounts = {};
      allMessages.filter(m => m.est_reponse).forEach(m => {
        replierCounts[m.auteur_id] = (replierCounts[m.auteur_id] || 0) + 1;
      });
      const sorted = Object.entries(replierCounts).sort(([,a],[,b]) => b - a);
      const max    = sorted[0]?.[1] || 1;

      const pairsEl = document.getElementById('reply-pairs');
      if (!sorted.length) {
        pairsEl.innerHTML = '<div class="empty">Aucune réponse directe collectée</div>';
      } else {
        pairsEl.innerHTML = sorted.slice(0, 20).map(([id, n]) => `
          <div class="pair-names">${esc(memberName(id))}</div>
          <div class="pair-bar-bg"><div class="pair-bar-fill" style="width:${Math.round(n/max*100)}%"></div></div>
          <div class="pair-count">${n}</div>`).join('');
      }

      document.getElementById('reply-matrix-info').innerHTML =
        `<strong style="color:var(--text)">Matrice "qui répond à qui"</strong><br>
        Disponible après la prochaine collecte — le champ <code style="background:rgba(255,255,255,.07);padding:.1em .4em;border-radius:3px">message_id</code>
        doit être ajouté à la collecte pour croiser les auteurs de réponses avec les auteurs des messages originaux.`;
    }

    // ── Contrôles ─────────────────────────────────────────────────
    document.getElementById('window-slider').addEventListener('input', e => {
      windowMin = +e.target.value;
      document.getElementById('window-val').textContent = windowMin;
      renderConvos();
    });

    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        convoView = btn.dataset.view;
        document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('view-pairs').style.display  = convoView === 'pairs'  ? '' : 'none';
        document.getElementById('view-groups').style.display = convoView === 'groups' ? '' : 'none';
        document.getElementById('sort-ctrl').style.display   = convoView === 'groups' ? '' : 'none';
      });
    });

    document.querySelectorAll('[data-sort]').forEach(btn => {
      btn.addEventListener('click', () => {
        convoSort = btn.dataset.sort;
        document.querySelectorAll('[data-sort]').forEach(b => b.classList.toggle('active', b === btn));
        renderConvos();
      });
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    load();
  </script>
</body>
</html>
