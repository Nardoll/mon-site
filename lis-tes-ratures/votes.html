<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votes — Lis tes ratures</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ════ Encart statut (vote actif ou prochain vote) ════ */
    .vs-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:1.5rem 1.8rem; margin-bottom:2rem; }
    .vs-row { display:flex; align-items:flex-start; justify-content:space-between; gap:1.5rem; flex-wrap:wrap; }
    .vs-left { display:flex; gap:1rem; align-items:flex-start; min-width:0; }
    .vs-icon { font-size:1.6rem; flex-shrink:0; margin-top:.1rem; }
    .vs-title { font-family:var(--serif); font-size:1.15rem; font-weight:700; color:var(--text); }
    .vs-meta { font-size:.8rem; color:var(--muted); margin-top:.15rem; }
    .vs-countdown { font-size:.82rem; color:var(--accent); margin-top:.3rem; font-weight:600; }
    .vs-books { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.75rem; }
    .vs-book { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.35rem .75rem; font-size:.82rem; }
    .vs-book-title { font-weight:600; color:var(--text); }
    .vs-book-author { font-size:.74rem; color:var(--muted); }
    .vs-bilan { display:flex; flex-wrap:wrap; gap:.35rem .85rem; margin-top:.8rem; }
    .vs-bilan-row { display:flex; align-items:center; gap:.38rem; font-size:.82rem; }
    .vs-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .vs-dot.done { background:var(--green); }
    .vs-dot.todo { background:var(--border); }
    .vs-tick { font-size:.72rem; color:var(--green); }
    .vs-right { flex-shrink:0; }
    /* prochain vote */
    .vs-next-link { text-decoration:none; display:block; }
    .vs-next-link .vs-card { transition:border-color .15s; cursor:pointer; }
    .vs-next-link:hover .vs-card { border-color:var(--accent); }
    .vs-next-link .vs-title { color:var(--text); }

    /* ════ Liste historique ════ */
    .vl-list { display:flex; flex-direction:column; gap:.55rem; }
    .vl-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:.95rem 1.3rem; display:flex; align-items:center; gap:1rem; cursor:pointer; transition:border-color .15s; }
    .vl-item:hover { border-color:var(--accent); }
    .vl-mois { font-family:var(--serif); font-weight:700; font-size:.95rem; color:var(--text); min-width:110px; }
    .vl-elu { flex:1; font-size:.85rem; color:var(--text); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .vl-elu strong { color:var(--green); }
    .vl-cnt { font-size:.77rem; color:var(--muted); white-space:nowrap; }
    .vl-arr { color:var(--muted); font-size:1rem; }

    /* ════ Détail overlay ════ */
    .vd-wrap { max-height:80vh; overflow-y:auto; }
    .vd-sec-title { font-family:var(--serif); font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:.85rem; display:flex; align-items:center; gap:.5rem; }
    .vd-sec-title svg { width:16px; height:16px; color:var(--accent); }
    .vd-divider { height:1px; background:var(--border); margin:1.4rem 0; }
    .vd-tour-label { font-size:.72rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--purple); margin-bottom:.85rem; }

    /* Graphique à barres verticales */
    .vchart-legend { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:.85rem; }
    .vchart-legend-item { display:flex; align-items:center; gap:.4rem; font-size:.76rem; color:var(--muted); }
    .vchart-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .vchart-outer { overflow-x:auto; padding-bottom:.5rem; }
    .vchart-wrap { display:inline-flex; flex-direction:column; min-width:100%; }
    .vchart-bars-area { display:flex; align-items:flex-end; gap:.85rem; position:relative; padding:0 .5rem; }
    .vchart-threshold { position:absolute; left:0; right:0; border-top:1.5px dashed rgba(181,87,45,.45); }
    .vchart-threshold-label { position:absolute; right:0; top:-1.1rem; font-size:.68rem; color:var(--accent); background:var(--bg); padding-left:.3rem; }
    .vchart-col { display:flex; flex-direction:column; align-items:center; gap:.35rem; flex:1; min-width:64px; }
    .vchart-val { font-family:var(--serif); font-size:.88rem; font-weight:700; }
    .vchart-bar { width:100%; border-radius:4px 4px 0 0; min-height:3px; transition:height .3s; }
    .vchart-labels { display:flex; gap:.85rem; padding:0 .5rem; margin-top:.5rem; }
    .vchart-label-col { flex:1; min-width:64px; font-size:.72rem; color:var(--muted); text-align:center; word-break:break-word; line-height:1.35; }

    /* Tableau des notes */
    .vtable-wrap { overflow-x:auto; margin-bottom:.5rem; }
    .vtable { width:100%; border-collapse:collapse; font-size:.8rem; }
    .vtable th { font-size:.67rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); padding:.4rem .65rem; border-bottom:1px solid var(--border); text-align:center; white-space:nowrap; }
    .vtable th.col-member { text-align:left; }
    .vtable td { padding:.48rem .65rem; border-bottom:1px solid rgba(120,90,50,.07); text-align:center; color:var(--muted); font-size:.8rem; vertical-align:middle; }
    .vtable td.col-member { text-align:left; color:var(--text); font-weight:500; }
    .vtable tr:last-child td { border-bottom:none; }
    .vtable .winner-col { color:var(--green); }
    .vtable .winner-cell { color:var(--green); font-weight:600; }
    .vtable .elim-col { color:var(--muted); opacity:.7; }
    .vtable .winner-avg { color:var(--green); font-weight:700; font-family:var(--serif); font-size:.9rem; }
    .vtable .book-avg { font-family:var(--serif); font-weight:700; color:var(--accent); font-size:.88rem; }
    .vtable tr.winner-row td { background:rgba(26,158,106,.05); }
    .vtable-foot-row td { color:var(--text); font-weight:600; font-size:.79rem; }
    .stars { font-size:.6rem; color:var(--muted); letter-spacing:.05rem; }

    /* Tour 2 */
    .vt2-detail { display:flex; flex-direction:column; gap:.5rem; margin-top:.5rem; }
    .vt2-row { display:flex; align-items:center; gap:.7rem; }
    .vt2-label { width:160px; font-size:.82rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .vt2-bar-wrap { flex:1; background:var(--chart-bar-bg); border-radius:4px; height:20px; }
    .vt2-bar { height:100%; border-radius:4px; display:flex; align-items:center; padding:0 .5rem; font-size:.7rem; font-weight:700; color:#fff; min-width:2px; }
    .vt2-count { font-size:.8rem; font-weight:600; min-width:2rem; text-align:right; }
    .vt2-tirage { font-size:.78rem; color:var(--muted); margin-bottom:.7rem; }

    /* Chart membre/livre */
    .vd-chart-head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; margin-bottom:.75rem; }
    .vd-chart-tabs { display:flex; gap:.3rem; }
    .vd-tab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.3rem .7rem; font-size:.78rem; cursor:pointer; color:var(--muted); font-family:inherit; }
    .vd-tab.on { background:var(--accent); border-color:var(--accent); color:var(--accent-text); font-weight:600; }
    .vd-member-select { background:var(--input-bg); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:.42rem .7rem; font-family:inherit; font-size:.85rem; width:100%; margin-bottom:.75rem; }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">

    <div class="page-header">
      <h1>Votes</h1>
    </div>

    <div id="vote-status-card">
      <div style="color:var(--muted);font-size:.85rem">Chargement…</div>
    </div>

    <div class="bib-section">
      <div class="sec-head">
        <span class="sec-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg>Historique des votes
        </span>
        <span class="sec-rule"></span>
      </div>
      <div id="votes-list">
        <div style="color:var(--muted);font-size:.85rem">Chargement…</div>
      </div>
    </div>

  </main>

  <!-- Overlay détail vote -->
  <div class="overlay hidden" id="detail-overlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 id="detail-title">Vote</h2>
        <button class="modal-close" id="detail-close">✕</button>
      </div>
      <div class="vd-wrap" id="detail-content"></div>
    </div>
  </div>

  <script type="module" src="js/votes.js"></script>
</body>
</html>
