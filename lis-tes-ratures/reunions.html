<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réunions — Lis tes ratures</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ════════════ En-tête ════════════ */
    .reu-actions { display: flex; align-items: center; gap: .8rem; }
    .btn-add { display: inline-flex; align-items: center; gap: .5rem; background: var(--accent); color: var(--accent-text); border: none; border-radius: 8px; padding: .6rem 1.05rem; font-size: .88rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, transform .15s; }
    .btn-add:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-add svg { width: 16px; height: 16px; }

    /* ════════════ Registre relié ════════════ */
    .ledger {
      position: relative;
      background: linear-gradient(180deg, #fcf6e7, #f3e7cd);
      border: 1px solid rgba(150,120,80,.34);
      border-radius: 3px 8px 8px 3px;
      box-shadow: 0 30px 60px -34px rgba(60,40,20,.6), inset 0 0 0 1px rgba(255,255,255,.4);
      padding: 1.6rem 2rem 1.4rem 3.4rem;
      max-width: 1040px;
      overflow: hidden;
    }
    /* reliure cousue */
    .ledger::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 26px;
      background: linear-gradient(90deg, #e3d2b0, #d8c49e 60%, #cdb88f);
      border-right: 1px solid rgba(120,90,50,.3);
      box-shadow: inset -3px 0 6px -3px rgba(90,60,30,.4);
    }
    /* points de couture */
    .ledger::after {
      content: ""; position: absolute; left: 12px; top: 18px; bottom: 18px; width: 2px;
      background: repeating-linear-gradient(180deg, rgba(120,90,50,.55) 0 7px, transparent 7px 16px);
    }
    /* double marge rouge */
    .ledger-margin { position: absolute; left: 40px; top: 0; bottom: 0; width: 1.5px; background: rgba(176,72,52,.4); box-shadow: 4px 0 0 rgba(176,72,52,.18); pointer-events: none; }

    .ledger-head { display: flex; align-items: baseline; gap: .9rem; padding-bottom: .9rem; margin-bottom: .2rem; border-bottom: 1.5px solid rgba(120,90,50,.28); position: relative; z-index: 1; }
    .ledger-title { font-family: var(--serif); font-size: 1.18rem; font-weight: 600; color: #2c2015; }
    .ledger-eyebrow { display: inline-flex; align-items: center; gap: .4rem; font-size: .66rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #1a7a4e; }
    .ledger-eyebrow svg { width: 14px; height: 14px; }
    .ledger-count { margin-left: auto; font-size: .76rem; color: #9a7a4e; font-style: italic; }

    /* ── Une ligne de séance ── */
    .reg-row {
      display: grid; grid-template-columns: 138px 1fr auto; align-items: center; gap: 1.6rem;
      width: 100%; text-align: left; font-family: inherit; cursor: pointer;
      background: none; border: none; border-bottom: 1px solid rgba(120,90,50,.2);
      padding: 1.15rem .4rem 1.15rem .2rem; position: relative; z-index: 1;
      transition: background .14s;
    }
    .reg-row:last-child { border-bottom: none; }
    .reg-row:hover { background: rgba(176,72,52,.05); }
    .reg-row:hover .reg-stamp { transform: rotate(-2.5deg) scale(1.03); }
    .reg-row.prevue { opacity: .7; }

    /* cachet de date */
    .reg-stamp {
      justify-self: start; display: inline-flex; flex-direction: column; align-items: center; gap: .12rem;
      color: #b0533a; border: 2px solid currentColor; border-radius: 3px;
      padding: .3rem .6rem .32rem; transform: rotate(-4deg);
      box-shadow: inset 0 0 0 1.5px rgba(255,250,240,.5), inset 0 0 0 2.5px currentColor;
      background: rgba(176,72,52,.045); opacity: .92; transition: transform .18s;
    }
    .reg-row.prevue .reg-stamp { color: #9a7a4e; }
    .reg-stamp-label { font-size: .52rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; opacity: .8; }
    .reg-stamp-date { font-family: 'Courier New', monospace; font-size: 1.02rem; font-weight: 700; letter-spacing: .04em; line-height: 1; }

    .reg-mid { min-width: 0; }
    .reg-livre { font-family: var(--serif); font-size: 1.32rem; font-weight: 600; color: #2c2015; line-height: 1.12; }
    .reg-mois { font-size: .8rem; color: #8a6b46; font-style: italic; margin-top: .12rem; }
    .reg-att { display: flex; align-items: center; gap: .5rem; margin-top: .6rem; flex-wrap: nowrap; }
    .reg-pips { display: inline-flex; gap: 3px; }
    .reg-pip { width: 9px; height: 9px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(120,90,50,.35); }
    .reg-pip.lu      { background: #2f9e6a; box-shadow: none; }
    .reg-pip.present { background: #d2935f; box-shadow: none; }
    .reg-pip.absent  { background: transparent; }
    .reg-att-text { font-size: .76rem; color: #8a6b46; white-space: nowrap; }
    .reg-att-text b { color: #5a4326; font-weight: 600; }

    /* cachet note (sceau rond) */
    .reg-seal {
      justify-self: end; width: 76px; height: 76px; flex-shrink: 0; border-radius: 50%;
      display: grid; place-items: center; transform: rotate(5deg);
      color: var(--seal, #b5572d); border: 2.5px solid currentColor; position: relative;
      box-shadow: inset 0 0 0 1.5px rgba(255,250,240,.55), inset 0 0 0 5px currentColor;
      background: rgba(181,87,45,.04); opacity: .94; transition: transform .18s;
    }
    .reg-row:hover .reg-seal { transform: rotate(2deg) scale(1.04); }
    .reg-seal::before { content: ""; position: absolute; inset: 7px; border-radius: 50%; border: 1px dashed currentColor; opacity: .45; }
    .reg-seal-inner { text-align: center; line-height: 1; position: relative; z-index: 1; }
    .reg-seal-note { font-family: var(--serif); font-weight: 700; font-size: 1.4rem; }
    .reg-seal-note span { font-size: .62rem; font-weight: 600; }
    .reg-seal-label { font-size: .4rem; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; margin-top: .14rem; opacity: .85; }

    /* ════════════ Overlay papier ════════════ */
    .paper-overlay .modal { padding: 0; background: transparent; border: none; max-width: 600px; max-height: none; overflow: visible; }
    .paper {
      position: relative; width: 100%; background: linear-gradient(180deg,#fcf6e8,#f4e8cf);
      border-radius: 5px; padding: 1.9rem 2.2rem 1.8rem 2.6rem; color: #3a2b1c;
      box-shadow: 0 40px 80px -30px rgba(0,0,0,.55), inset 0 0 0 1px rgba(120,90,50,.12);
      max-height: 90vh; overflow-y: auto; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .paper::before { content: ""; position: absolute; left: 1.65rem; top: 0; bottom: 0; width: 1.5px; background: rgba(176,72,52,.3); pointer-events: none; }
    .paper-close { position: absolute; top: .85rem; right: 1rem; background: none; border: none; font-size: 1.25rem; color: #8a7560; cursor: pointer; line-height: 1; padding: .05rem .25rem; z-index: 2; }
    .paper-close:hover { color: #3a2b1c; }

    /* en-tête fiche réunion */
    .mtg-head { display: flex; align-items: flex-start; gap: 1.15rem; padding-right: 2.5rem; }
    .mtg-cover { width: 56px; height: 82px; flex-shrink: 0; border-radius: 2px 5px 5px 2px; background: linear-gradient(158deg, var(--g1,#5a4636), var(--g2,#382a20)); box-shadow: 0 10px 18px -10px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.07); position: relative; overflow: hidden; }
    .mtg-cover::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: rgba(0,0,0,.26); }
    .mtg-cover span { position: absolute; inset: 0; font-family: var(--serif); font-size: .5rem; color: #fdf6ea; padding: .4rem .28rem .28rem .5rem; line-height: 1.12; font-weight: 600; }
    .mtg-head-info { flex: 1; min-width: 0; padding-top: .1rem; }
    .mtg-eyebrow { display: inline-flex; align-items: center; gap: .4rem; font-size: .64rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #1a7a4e; }
    .mtg-eyebrow.prevue { color: #9a7a4e; }
    .mtg-eyebrow svg { width: 13px; height: 13px; }
    .mtg-livre { font-family: var(--serif); font-size: 1.55rem; font-weight: 600; color: #2c2015; line-height: 1.08; margin-top: .25rem; }
    .mtg-livre-link { color: #b5572d; text-decoration: none; font-size: .82rem; font-weight: 600; display: inline-flex; align-items: center; gap: .25rem; margin-top: .3rem; }
    .mtg-livre-link:hover { text-decoration: underline; }
    .mtg-meta { font-size: .82rem; color: #8a6b46; margin-top: .15rem; }
    .mtg-meta .sep { color: #c0a878; margin: 0 .4rem; }
    .mtg-seal { flex-shrink: 0; width: 72px; height: 72px; border-radius: 50%; display: grid; place-items: center; transform: rotate(5deg); color: var(--seal,#b5572d); border: 2.5px solid currentColor; position: relative; box-shadow: inset 0 0 0 1.5px rgba(255,250,240,.55), inset 0 0 0 5px currentColor; background: rgba(181,87,45,.04); }
    .mtg-seal::before { content: ""; position: absolute; inset: 6px; border-radius: 50%; border: 1px dashed currentColor; opacity: .45; }
    .mtg-seal-inner { text-align: center; line-height: 1; position: relative; z-index: 1; }
    .mtg-seal-note { font-family: var(--serif); font-weight: 700; font-size: 1.32rem; }
    .mtg-seal-note span { font-size: .6rem; font-weight: 600; }
    .mtg-seal-label { font-size: .38rem; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; margin-top: .12rem; opacity: .85; }

    .mtg-divider { height: 1px; background: rgba(120,90,50,.22); margin: 1.4rem 0; }
    .mtg-sec-title { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: #2c2015; margin-bottom: .9rem; display: flex; align-items: center; gap: .5rem; white-space: nowrap; }
    .mtg-sec-title svg { width: 16px; height: 16px; color: #b5572d; }
    .mtg-sec-title .aside { margin-left: auto; font-size: .76rem; font-weight: 400; color: #8a6b46; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* tampons membres (tour de table) */
    .mtg-att-grid { display: flex; flex-wrap: wrap; gap: .7rem; }
    .mtg-tampon { display: flex; flex-direction: column; align-items: center; gap: .3rem; width: 58px; }
    .mtg-tampon-seal { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; transform: rotate(-6deg); color: var(--mc,#8a4a2a); border: 2px solid currentColor; box-shadow: inset 0 0 0 1.5px rgba(255,250,240,.4); font-family: var(--serif); font-weight: 700; font-size: .92rem; opacity: .9; position: relative; }
    .mtg-tampon-seal::before { content: ""; position: absolute; inset: 3px; border-radius: 50%; border: 1px solid currentColor; opacity: .5; }
    .mtg-tampon.lu .mtg-tampon-seal::after { content: "✓"; position: absolute; right: -5px; bottom: -3px; width: 17px; height: 17px; border-radius: 50%; background: #1a8a55; color: #fff; font-size: .66rem; display: grid; place-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.3); transform: rotate(6deg); }
    .mtg-tampon.absent { opacity: .5; }
    .mtg-tampon.absent .mtg-tampon-seal { filter: grayscale(.5); }
    .mtg-tampon-name { font-size: .68rem; color: #5a4326; text-align: center; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 58px; }
    .mtg-att-legend { display: flex; flex-wrap: wrap; gap: .35rem 1rem; margin-top: .9rem; font-size: .72rem; color: #8a6b46; }
    .mtg-att-legend span { display: inline-flex; align-items: center; gap: .35rem; }
    .mtg-leg-dot { width: 11px; height: 11px; border-radius: 50%; }

    /* notes en lecture (barres) */
    .mtg-notes { display: flex; flex-direction: column; gap: .5rem; }
    .mtg-note-row { display: grid; grid-template-columns: 116px 1fr 40px; align-items: center; gap: .8rem; }
    .mtg-note-name { font-size: .86rem; color: #3a2b1c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mtg-note-track { height: 16px; background: rgba(120,90,50,.13); border-radius: 4px; overflow: hidden; }
    .mtg-note-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #c98a5a, #b5572d); }
    .mtg-note-val { font-family: var(--serif); font-weight: 700; font-size: .92rem; color: #b5572d; text-align: right; }
    .mtg-note-val span { font-size: .62rem; font-weight: 400; color: #a08768; }
    .mtg-avg { display: flex; align-items: baseline; gap: .5rem; margin-top: 1rem; padding-top: .85rem; border-top: 1px dashed rgba(120,90,50,.3); }
    .mtg-avg-label { font-size: .82rem; color: #6a513a; }
    .mtg-avg-val { font-family: var(--serif); font-weight: 700; font-size: 1.45rem; color: #b5572d; line-height: 1; }
    .mtg-avg-val span { font-size: .76rem; font-weight: 400; color: #9a8160; }

    /* notes en édition */
    .mtg-edit-row { display: grid; grid-template-columns: 1fr 92px; align-items: center; gap: .8rem; padding: .35rem 0; border-bottom: 1px solid rgba(120,90,50,.14); }
    .mtg-edit-row:last-of-type { border-bottom: none; }
    .mtg-edit-name { font-size: .9rem; color: #3a2b1c; }
    .mtg-edit-input-wrap { display: flex; align-items: center; gap: .35rem; justify-content: flex-end; }
    .mtg-edit-input { width: 56px; background: rgba(255,255,255,.7); border: 1px solid rgba(120,90,50,.3); border-radius: 6px; color: #3a2b1c; padding: .4rem; font-size: .9rem; text-align: center; font-family: inherit; }
    .mtg-edit-input:focus { outline: none; border-color: #b5572d; }
    .mtg-edit-unit { font-size: .78rem; color: #a08768; }
    .mtg-edit-add { display: flex; align-items: center; gap: .6rem; margin-top: 1rem; padding-top: .9rem; border-top: 1px dashed rgba(120,90,50,.3); }
    .mtg-edit-add label { font-size: .8rem; color: #8a5a2a; font-weight: 600; white-space: nowrap; }
    .mtg-edit-select { flex: 1; background: rgba(255,255,255,.7); border: 1px solid rgba(120,90,50,.3); border-radius: 7px; color: #3a2b1c; padding: .5rem .7rem; font-size: .88rem; font-family: inherit; cursor: pointer; }
    .mtg-edit-select:focus { outline: none; border-color: #b5572d; }
    .mtg-foot { display: flex; justify-content: flex-end; gap: .6rem; margin-top: 1.4rem; }

    /* boutons */
    .rf-edit { display: inline-flex; align-items: center; gap: .4rem; background: rgba(255,255,255,.5); border: 1px solid rgba(120,90,50,.3); color: #8a5a2a; border-radius: 7px; padding: .4rem .75rem; font-size: .8rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, color .15s; }
    .rf-edit:hover { background: rgba(181,87,45,.1); color: #b5572d; }
    .rf-edit svg { width: 14px; height: 14px; }
    .pf-btn { border-radius: 7px; padding: .5rem 1.1rem; font-size: .86rem; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid transparent; transition: background .15s; }
    .pf-btn.cancel { background: transparent; border-color: rgba(120,90,50,.3); color: #6a513a; }
    .pf-btn.cancel:hover { background: rgba(120,90,50,.08); }
    .pf-btn.ok { background: #b5572d; color: #fff7ee; }
    .pf-btn.ok:hover { background: #c46b41; }
    .pf-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* formulaire ajout */
    .pf-group { margin-bottom: 1.1rem; }
    .pf-group label { display: block; font-size: .8rem; font-weight: 600; color: #8a5a2a; margin-bottom: .35rem; }
    .pf-group label .req { color: #b0444a; }
    .pf-group label .pf-hint { font-size: .72rem; font-weight: 400; color: #a08768; font-style: italic; }
    .pf-input { width: 100%; background: rgba(255,255,255,.6); border: 1px solid rgba(120,90,50,.3); border-radius: 7px; color: #3a2b1c; padding: .58rem .8rem; font-size: .9rem; font-family: inherit; box-sizing: border-box; }
    .pf-input:focus { outline: none; border-color: #b5572d; }
    select.pf-input { cursor: pointer; }
    textarea.pf-input { resize: vertical; min-height: 84px; line-height: 1.45; }
    .pf-foot { display: flex; justify-content: flex-end; gap: .6rem; margin-top: 1.6rem; padding-top: 1.1rem; border-top: 1px solid rgba(120,90,50,.22); }
    .pf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.1rem; }
    .pf-livre { display: flex; align-items: center; gap: .6rem; background: rgba(255,255,255,.45); border: 1px solid rgba(120,90,50,.22); border-radius: 8px; padding: .55rem .75rem; min-height: 38px; }
    .pf-livre svg { width: 16px; height: 16px; color: #b5572d; flex-shrink: 0; }
    .pf-livre b { font-family: var(--serif); font-weight: 600; color: #2c2015; }
    .pf-livre .auth { color: #8a6b46; font-size: .85rem; }
    /* listes de présence */
    .pf-checklist { max-height: 152px; overflow-y: auto; border: 1px solid rgba(120,90,50,.3); border-radius: 8px; background: rgba(255,255,255,.4); padding: .35rem .55rem; }
    .pf-checklist::-webkit-scrollbar { width: 8px; }
    .pf-checklist::-webkit-scrollbar-thumb { background: rgba(150,120,80,.45); border-radius: 6px; }
    .pf-check { display: flex; align-items: center; gap: .6rem; padding: .34rem .25rem; margin-bottom: 0; font-size: .9rem; font-weight: 400; color: #3a2b1c; cursor: pointer; border-radius: 5px; }
    .pf-check:hover { background: rgba(181,87,45,.07); }
    .pf-check input { accent-color: #b5572d; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; margin: 0; }
    .pf-check .mc-dot { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; font-family: var(--serif); font-weight: 700; font-size: .58rem; color: #fff; flex-shrink: 0; }
    .pf-chk-tools { display: flex; gap: .8rem; margin-top: .35rem; }
    .pf-chk-tools button { background: none; border: none; font-family: inherit; font-size: .74rem; font-weight: 600; color: #8a5a2a; cursor: pointer; padding: 0; }
    .pf-chk-tools button:hover { color: #b5572d; text-decoration: underline; }
    .pf-eyebrow { font-size: .66rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #a07c4e; margin-bottom: .15rem; }
    .pf-title { font-family: var(--serif); font-size: 1.5rem; font-weight: 600; color: #2c2015; margin-bottom: 1.4rem; }

    /* toast */
    .mtoast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(1rem); background: #2c2015; color: #fdf6ea; border-radius: 9px; padding: .7rem 1.3rem; font-size: .86rem; z-index: 999; opacity: 0; transition: all .25s; pointer-events: none; box-shadow: 0 18px 40px -18px rgba(0,0,0,.6); }
    .mtoast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      .ledger { padding: 1.3rem 1.1rem 1.1rem 2.6rem; }
      .reg-row { grid-template-columns: 96px 1fr; gap: .9rem; }
      .reg-seal { grid-column: 2; justify-self: start; margin-top: .4rem; }
      .paper { padding: 1.6rem 1.4rem 1.5rem 1.8rem; }
      .paper::before { left: 1.1rem; }
    }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <h1>Réunions</h1>
      <div class="reu-actions">
        <button class="btn-add" id="btn-add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Ajouter une réunion
        </button>
      </div>
    </div>

    <div class="ledger" id="ledger">
      <div class="ledger-margin"></div>
      <div class="ledger-head">
        <span class="ledger-eyebrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          Séances consignées
        </span>
        <span class="ledger-count" id="ledger-count"></span>
      </div>
      <div id="reg-rows">
        <p style="color:#a98a5c;font-style:italic;padding:.8rem 0">Chargement…</p>
      </div>
    </div>
  </main>

  <!-- Fiche réunion -->
  <div class="overlay paper-overlay hidden" id="mtg-overlay">
    <div class="modal">
      <div class="paper" id="mtg-paper"></div>
    </div>
  </div>

  <!-- Ajouter une réunion -->
  <div class="overlay paper-overlay hidden" id="add-overlay">
    <div class="modal" style="max-width:520px">
      <div class="paper" id="add-paper"></div>
    </div>
  </div>

  <div class="mtoast" id="mtoast"></div>

  <script type="module" src="js/reunions.js"></script>
</body>
</html>
